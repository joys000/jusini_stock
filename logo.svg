<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Teal border gradient -->
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00f5c8"/>
      <stop offset="50%"  stop-color="#00dd66"/>
      <stop offset="100%" stop-color="#00c5b8"/>
    </linearGradient>
    <!-- Leaf gradient (light green) -->
    <linearGradient id="leafL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#44ff88"/>
      <stop offset="100%" stop-color="#00cc55"/>
    </linearGradient>
    <!-- Leaf gradient (darker) -->
    <linearGradient id="leafR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#22ee77"/>
      <stop offset="100%" stop-color="#00aa44"/>
    </linearGradient>
    <!-- Background radial -->
    <radialGradient id="bgGrad" cx="50%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#0f1f35"/>
      <stop offset="100%" stop-color="#050e1a"/>
    </radialGradient>
    <!-- Glow filter for border -->
    <filter id="glowBorder" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow filter for plant -->
    <filter id="glowPlant" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Orange dot glow -->
    <filter id="glowDot" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip to octagon -->
    <clipPath id="oct">
      <polygon points="27,2 73,2 98,27 98,73 73,98 27,98 2,73 2,27"/>
    </clipPath>
  </defs>

  <!-- ── Background octagon ── -->
  <polygon points="27,2 73,2 98,27 98,73 73,98 27,98 2,73 2,27"
    fill="url(#bgGrad)"/>

  <!-- ── Inner subtle teal ambient ── -->
  <polygon points="27,2 73,2 98,27 98,73 73,98 27,98 2,73 2,27"
    fill="none" stroke="#00e5c8" stroke-width="8" opacity="0.04"/>

  <!-- ── Mountain / terrain lines (bottom) ── -->
  <g clip-path="url(#oct)" opacity="0.35">
    <polyline points="8,85 22,68 34,76 46,60 58,70 72,54 88,68 92,85"
      fill="none" stroke="#00d4b8" stroke-width="1.4" stroke-linejoin="round"
      stroke-linecap="round"/>
    <!-- Fill beneath line -->
    <polygon points="8,85 22,68 34,76 46,60 58,70 72,54 88,68 92,85 92,98 8,98"
      fill="#00d4b8" opacity="0.07"/>
  </g>

  <!-- ── Plant stem ── -->
  <line x1="50" y1="79" x2="50" y2="52"
    stroke="#00dd66" stroke-width="2.8" stroke-linecap="round"
    filter="url(#glowPlant)"/>

  <!-- ── Left leaf ── -->
  <path d="M50 68 C42 62 30 50 35 37 C40 40 50 60 50 68 Z"
    fill="url(#leafL)" filter="url(#glowPlant)" opacity="0.95"/>
  <!-- Left leaf vein -->
  <path d="M43 55 C46 60 49 66 50 68"
    fill="none" stroke="#aaffcc" stroke-width="0.7" opacity="0.6"/>

  <!-- ── Right leaf ── -->
  <path d="M50 60 C58 54 70 42 65 29 C60 33 50 54 50 60 Z"
    fill="url(#leafR)" filter="url(#glowPlant)" opacity="0.95"/>
  <!-- Right leaf vein -->
  <path d="M57 47 C54 53 51 58 50 60"
    fill="none" stroke="#aaffcc" stroke-width="0.7" opacity="0.6"/>

  <!-- ── Ground ring ── -->
  <ellipse cx="50" cy="80" rx="7" ry="2.5"
    fill="#00aa44" opacity="0.45"/>

  <!-- ── Teal border (glowing) ── -->
  <polygon points="27,2 73,2 98,27 98,73 73,98 27,98 2,73 2,27"
    fill="none" stroke="url(#borderG)" stroke-width="2.8"
    filter="url(#glowBorder)"/>

  <!-- ── Corner cut accent lines ── -->
  <line x1="27" y1="2"  x2="73" y2="2"  stroke="#00f5c8" stroke-width="0.5" opacity="0.5"/>
  <line x1="27" y1="98" x2="73" y2="98" stroke="#00f5c8" stroke-width="0.5" opacity="0.5"/>

  <!-- ── Status dot (orange LED) ── -->
  <circle cx="79" cy="21" r="5" fill="#FF8C00" opacity="0.25" filter="url(#glowDot)"/>
  <circle cx="79" cy="21" r="3.2" fill="#FFAA00" filter="url(#glowDot)"/>
  <circle cx="79" cy="21" r="2"   fill="#FFD040"/>

  <!-- ── "status" text ── -->
  <text x="13" y="20" font-family="'DM Sans',Arial,sans-serif"
    font-size="7.5" font-weight="600" fill="#ccddee" letter-spacing="0.2">status</text>

  <!-- ── "active" text ── -->
  <text x="13" y="29" font-family="'DM Sans',Arial,sans-serif"
    font-size="7" font-weight="700" fill="#00e5c8" letter-spacing="0.3">active</text>
</svg>
