name: UPDATE
on:
  # 'on' 바로 아래에 두 칸 들여쓰기가 생명입니다.
  release:
    types: [published]
  # 수동 버튼을 위해 이것도 반드시 포함하십시오.
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord 알림 전송
        uses: sarisia/actions-status-discord@v1
        with:
          # 시크릿 탭에 등록한 이름이 'UPDATE'인지 다시 확인하십시오.
          webhook: ${{ secrets.UPDATE }}
          status: success
          title: "🚀 주리니 계산기 신규 업데이트 공지!"
          description: |
            📦 **버전:** ${{ github.event.release.tag_name }}
            📝 **업데이트 내용:** ${{ github.event.release.body }}
            
            🔗 **상세정보:** [GitHub Release 바로가기](${{ github.event.release.html_url }})
          color: 0x00ff00
