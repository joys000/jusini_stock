<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF5C00"/>
      <stop offset="100%" stop-color="#FF7A30"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 오렌지 글로우 원 -->
  <circle cx="1000" cy="120" r="180" fill="#FF5C00" opacity="0.08" filter="url(#glow)"/>
  <circle cx="150" cy="550" r="220" fill="#FF5C00" opacity="0.05" filter="url(#glow)"/>

  <!-- 로고 박스 -->
  <rect x="80" y="80" width="80" height="80" rx="18" fill="url(#accent)"/>
  <text x="120" y="140" font-family="'DM Sans', sans-serif" font-weight="800" font-size="44" fill="#fff" text-anchor="middle">주</text>

  <!-- 브랜드 이름 -->
  <text x="180" y="135" font-family="'DM Sans', sans-serif" font-weight="800" font-size="30" fill="#fff" letter-spacing="2">주린이 계산기</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="290" font-family="'DM Sans', sans-serif" font-weight="800" font-size="72" fill="#fff">주식, 이번엔 감 말고</text>
  <text x="80" y="380" font-family="'DM Sans', sans-serif" font-weight="800" font-size="72" fill="url(#accent)">숫자로 시작하세요</text>

  <!-- 서브 카피 -->
  <text x="80" y="445" font-family="'DM Sans', sans-serif" font-weight="500" font-size="28" fill="#888">평단가 · 배당금 · 모의투자까지</text>
  <text x="80" y="485" font-family="'DM Sans', sans-serif" font-weight="500" font-size="28" fill="#888">주린이가 실전 전에 꼭 써봐야 할 도구 7가지</text>

  <!-- 하단 배지 -->
  <rect x="80" y="530" width="200" height="44" rx="22" fill="rgba(255,92,0,0.12)" stroke="#FF5C00" stroke-width="1.5"/>
  <circle cx="108" cy="552" r="5" fill="#FF5C00"/>
  <text x="130" y="559" font-family="'DM Sans', sans-serif" font-weight="700" font-size="16" fill="#FF5C00">100% 무료 · 회원가입 없음</text>

  <!-- 도메인 -->
  <text x="1120" y="572" font-family="'DM Sans', sans-serif" font-weight="500" font-size="18" fill="#555" text-anchor="end">joys000.github.io/jusini_stock</text>
</svg>
