<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주린이 사관학교 | 투자자 온보딩</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* Light Mode */
            --primary: #FFD600; --primary-dark: #FFB300; --primary-glow: rgba(255, 214, 0, 0.3);
            --bg: #F8F9FA; --card-bg: #FFFFFF;
            --text: #2D3436; --secondary: #636E72;
            --danger: #FF6B6B; --success: #00D9A3;
            --border: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            /* Dark Mode */
            --primary: #FFD600; --primary-glow: rgba(255, 214, 0, 0.4);
            --bg: #0A0B10; --card-bg: #1E202D;
            --text: #E0E0E0; --secondary: #94A3B8;
            --danger: #FF5252; --success: #00E676;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; overflow-x: hidden; transition: 0.3s;
            padding-top: 20px;
        }

        .app-container { 
            width: 95%; max-width: 500px; padding: 30px; position: relative;
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        /* 🏠 헤더 영역 (테마 버튼 & 계급 분리) */
        .academy-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border);
        }

        .theme-toggle {
            background: var(--bg); border: 1px solid var(--border);
            width: 38px; height: 38px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }

        .rank-badge {
            background: var(--primary); color: #000; padding: 6px 14px;
            border-radius: 10px; font-weight: 800; font-size: 0.85rem;
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        /* 📋 로비 설명 섹션 */
        .intro-section {
            background: rgba(0,0,0,0.03); padding: 20px; border-radius: 20px;
            margin-bottom: 30px; border-left: 4px solid var(--primary);
        }
        .intro-section h2 { margin: 0 0 10px; font-size: 1.4rem; font-weight: 800; }
        .intro-section p { margin: 0; font-size: 0.9rem; color: var(--secondary); line-height: 1.6; }

        /* 🗺️ 스테이지 경로 디자인 */
        .stage-path { display: flex; flex-direction: column; align-items: center; gap: 40px; position: relative; padding: 20px 0; }
        .stage-path::before { 
            content: ''; position: absolute; top: 0; bottom: 0; width: 2px; 
            background: repeating-linear-gradient(to bottom, transparent, transparent 10px, var(--border) 10px, var(--border) 20px);
        }

        .stage-node {
            width: 70px; height: 70px; border-radius: 50%; background: var(--bg);
            border: 3px solid var(--border); display: flex; justify-content: center; 
            align-items: center; cursor: pointer; transition: 0.4s; z-index: 2; position: relative;
        }
        .stage-node.unlocked { border-color: var(--primary); background: var(--card-bg); }
        .stage-node.unlocked:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--primary-glow); }
        .stage-node.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        
        .stage-info { position: absolute; left: 90px; text-align: left; width: 180px; }
        .stage-info h3 { margin: 0; font-size: 1rem; font-weight: 800; }
        .stage-info p { margin: 2px 0 0; font-size: 0.8rem; color: var(--secondary); }

        /* 📺 퀴즈 UI */
        #quiz-screen { display: none; }
        .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 700; font-size: 0.8rem; }
        .progress-bar { flex-grow: 1; height: 8px; background: var(--border); border-radius: 4px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        
        .mentor-briefing { 
            background: rgba(0,0,0,0.02); padding: 20px; border-radius: 20px; 
            margin-bottom: 25px; border-left: 5px solid var(--primary); min-height: 100px;
        }
        .visual-hud { background: rgba(0,0,0,0.02); height: 100px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 20px; border: 1px solid var(--border); }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .tactical-btn {
            background: var(--card-bg); border: 1.5px solid var(--border); 
            padding: 18px; border-radius: 18px; font-weight: 600; cursor: pointer;
            transition: 0.2s; text-align: left; color: var(--text); font-size: 1rem;
        }
        .tactical-btn:hover { border-color: var(--primary); transform: translateX(5px); }

        /* 🚨 모달 스타일 */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); padding: 40px 30px; border-radius: 35px; width: 100%; max-width: 420px; text-align: center; border: 2px solid var(--primary); }
        .btn-confirm { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="academy-header">
            <div id="rank-container">
                <span style="font-size: 0.7rem; color: var(--secondary); display: block; margin-bottom: 4px;">나의 투자 등급</span>
                <span id="rank-display" class="rank-badge">입문자</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
        </div>

        <div id="lobby-screen">
            <div class="intro-section">
                <h2>📈 주린이 사관학교</h2>
                <p>
                    여기는 실전 투자 전, 기초 체력을 기르는 훈련소입니다.<br>
                    <strong>4개의 스테이지</strong>를 통과하여 진정한 <b>자산가</b>로 거듭나세요.<br>
                    * 각 단계에서 8문제 중 6개 이상 맞춰야 다음 단계가 열립니다.
                </p>
            </div>
            <div class="stage-path" id="stage-path-list"></div>
        </div>

        <div id="quiz-screen">
            <div class="quiz-meta">
                <span id="current-stage-title" style="color:var(--primary-dark)">훈련 구역 01</span>
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <span id="question-count">01/08</span>
            </div>
            
            <div class="visual-hud" id="visual-element">💰</div>
            
            <div class="mentor-briefing">
                <span style="font-weight:800; color:var(--primary-dark); font-size:0.75rem; display:block; margin-bottom:8px;">멘토 재우의 실시간 지시</span>
                <p id="question-text" style="font-size: 1.1rem; line-height: 1.6; margin: 0; font-weight: 600;"></p>
            </div>

            <div class="options-grid" id="options-container"></div>
            
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="tactical-btn" style="flex:1; text-align:center; padding:12px;" onclick="openHintModal()">💡 힌트 보기</button>
                <button class="tactical-btn" style="flex:1; text-align:center; padding:12px; color:var(--danger);" onclick="openConfirmModal()">🚪 훈련 중단</button>
            </div>
        </div>
    </div>

    <div class="modal" id="result-modal">
        <div class="modal-content">
            <span id="modal-icon" style="font-size:4rem;">🎯</span>
            <h2 id="modal-title" style="margin:10px 0; font-weight: 800;">정답이다!</h2>
            <div id="modal-explanation" style="background: rgba(0,0,0,0.05); padding: 20px; border-radius: 15px; text-align: left; font-size: 0.95rem; line-height: 1.6; margin: 20px 0;"></div>
            <button class="btn-confirm" id="modal-next-btn" onclick="handleModalNext()">다음 문제로 →</button>
        </div>
    </div>

    <div class="modal" id="stage-result-modal">
        <div class="modal-content">
            <span id="stage-result-icon" style="font-size:5rem;">🎖️</span>
            <h2 id="stage-result-title" style="margin-bottom:10px; font-weight:800; font-size:1.8rem;">임무 완료!</h2>
            <p id="stage-result-score" style="font-size:1.3rem; font-weight:800; color:var(--primary-dark);">맞은 개수: 0 / 8</p>
            <div id="stage-result-msg" style="margin-bottom:25px; color:var(--secondary); font-size:0.95rem; line-height:1.6;"></div>
            <div id="stage-result-btns" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
    </div>

    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <span style="font-size:4rem;">⚠️</span>
            <h2 style="font-weight: 800;">훈련을 중단할까?</h2>
            <p style="margin-bottom:25px; color:var(--secondary);">지금 나가면 이 스테이지의 성적은<br>저장되지 않아!</p>
            <button class="btn-confirm" onclick="closeConfirmModal()">계속하기</button>
            <button class="tactical-btn" style="text-align:center; margin-top:10px;" onclick="goLobbyActual()">훈련 중단</button>
        </div>
    </div>

    <div class="modal" id="hint-modal">
        <div class="modal-content">
            <span style="font-size:3.5rem;">💡</span>
            <h2 style="font-weight: 800; color:var(--primary-dark);">재우의 힌트</h2>
            <div id="hint-text" style="padding: 20px; font-size: 1rem; line-height: 1.5; font-weight: 600;"></div>
            <button class="btn-confirm" onclick="closeHintModal()">알겠습니다!</button>
        </div>
    </div>

    <script>
        const quizDB = [
            { stage: 1, title: "기초 체력 훈련", questions: [ { q: "주식은 회사의 주인이 되는 티켓이야. 회사가 번 돈을 주인에게 나눠주는 걸 뭐라고 할까?", a: "배당금", options: ["배당금", "이자"], h: "은행이 주는 건 이자, 회사가 주는 건...", e: "배당금은 동업의 대가야. 주식을 산다는 건 그 회사의 성장 과실을 나눌 권리를 갖는 거지." }, { q: "회사의 가치를 나타내는 지표로 '주가 x 발행 주식수'를 한 것을 무엇이라 할까?", a: "시가총액", options: ["시가총액", "자본금"], h: "이 회사를 통째로 사려면 필요한 총액이야.", e: "시가총액은 시장이 평가하는 기업의 진짜 몸값이야. 몸집이 큰 종목일수록 주가가 무거워지는 경향이지." }, { q: "수익이 다시 원금이 되어 이자에 이자가 붙는 마법 같은 현상은?", a: "복리", options: ["복리", "단리"], h: "시간이 너의 편이 되게 만드는 방법이야.", e: "복리는 눈덩이(Snowball) 효과와 같아. 주린이가 부자가 되는 유일하고 확실한 방법이지." }, { q: "주가가 계속 오르는 강세장을 상징하는 동물은?", a: "황소", options: ["황소", "곰"], h: "뿔로 적을 아래에서 위로 치받는 모습을 상상해봐.", e: "황소(Bull)는 상승장, 곰(Bear)은 하락장을 상징해. 뿔은 위로, 발톱은 아래로 내리찍으니까!" }, { q: "기업이 이익을 내지 못하고 손해를 보는 상태를 일컫는 말은?", a: "적자", options: ["적자", "흑자"], h: "가계부 쓸 때 빨간 글씨가 많으면?", e: "적자는 지출이 수입보다 많은 위험한 상태야. 고래들은 보통 적자 기업을 피한단다." }, { q: "주식 시장에 처음으로 기업의 주식을 공개하고 상장하는 절차는?", a: "IPO", options: ["IPO", "M&A"], h: "공모주 청약 전 단계라고 보면 돼.", e: "기업공개(IPO)를 통해 기업은 투명해지고, 우리는 그 회사의 주인이 될 기회를 얻지." }, { q: "물가가 상승하여 돈의 가치가 떨어지는 현상은?", a: "인플레이션", options: ["인플레이션", "디플레이션"], h: "자장면 값이 예전보다 비싸진 이유!", e: "인플레이션 시기에는 현금을 들고 있으면 가난해져. 주식 같은 자산으로 돈의 가치를 지켜야 해." }, { q: "주가가 떨어졌을 때 추가로 사서 평균 단가를 낮추는 행위는?", a: "물타기", options: ["물타기", "불타기"], h: "농도를 연하게 만드는 과정과 비슷해.", e: "물타기는 양날의 검이야. 확신 없는 물타기는 파산의 지름길이니 주의해라!" } ] },
            { stage: 2, title: "차트 해독 작전", questions: [ { q: "시작 가격보다 마감 가격이 낮을 때 생기는 파란색 막대기는?", a: "음봉", options: ["양봉", "음봉"], h: "차가운 파랑... 하락의 신호야.", e: "음봉은 매도세가 매수세를 이겼다는 증거야. 누군가 필사적으로 팔고 도망갔다는 뜻이지." }, { q: "최근 20일 동안의 주가 평균을 선으로 이은 것은?", a: "20일 이동평균선", options: ["20일 이동평균선", "볼린저밴드"], h: "가장 대중적인 '심리선'이야.", e: "이동평균선(MA)은 추세를 보여줘. 20일선은 보통 개미와 고래들의 심리가 격돌하는 생명선이지." }, { q: "캔들 몸통 위아래로 삐져나온 선들을 뭐라고 부를까?", a: "꼬리", options: ["꼬리", "수염"], h: "장중에 가격이 잠깐 다녀간 흔적이야.", e: "꼬리는 치열한 전투의 흔적이야. 윗꼬리가 길면 높은 가격에서 저항을 받았다는 뜻이란다." }, { q: "주가가 떨어지다가 더 이상 안 떨어지게 받쳐주는 구간은?", a: "지지선", options: ["지지선", "저항선"], h: "바닥에서 튼튼하게 버텨주는 힘!", e: "지지선이 무너지면 공포 매물이 쏟아져. 반대로 여기서 반등하면 좋은 매수 타점이 되지." }, { q: "단기 선이 장기 선을 아래에서 위로 뚫고 올라가는 신호는?", a: "골든크로스", options: ["골든크로스", "데드크로스"], h: "이름만 들어도 기분 좋은 황금빛 교차!", e: "골든크로스는 강력한 상승 추세 전환 신호야. 고래들이 진입하기 시작했다는 증거일 수 있어." }, { q: "거래량이 갑자기 폭발하며 주가가 오르는 것은?", a: "진짜 상승", options: ["진짜 상승", "허수 주문"], h: "돈의 에너지가 실린 움직임을 봐.", e: "거래량은 속일 수 없는 지표야. 거래량 없는 상승은 모래성처럼 금방 무너지기 마련이지." }, { q: "주가가 특정 범위 안에서만 오르내리는 지루한 장세는?", a: "횡보", options: ["횡보", "폭등"], h: "옆으로 기어가는 모양을 생각해보렴.", e: "횡보는 에너지를 응축하는 기간이야. 이 박스권을 뚫는 방향이 향후 운명을 결정한단다." }, { q: "캔들 몸통이 거의 없고 십자가 모양인 형태(도지)의 의미는?", a: "매수/매도 팽팽함", options: ["매수/매도 팽팽함", "무조건 하락"], h: "싸움이 비겼다는 뜻이야.", e: "도지 캔들은 추세의 변곡점에서 자주 나타나. 다음 날 방향성이 결정될 확률이 아주 높지." } ] },

            { stage: 4, title: "생존 전략 수립", questions: [ { q: "주가가 떨어질 때 원금을 지키기 위해 파는 원칙은?", a: "손절매", options: ["손절매", "익절"], h: "상처가 깊어지기 전에 잘라내는 것.", e: "손절은 패배가 아니라 생존이야. -10% 손절은 다음을 기약하지만, -50%는 복구가 거의 불가능해." }, { q: "나만 돈을 못 벌까 봐 불안해서 고점에서 사는 심리는?", a: "FOMO", options: ["FOMO", "COOL"], h: "소외되는 것에 대한 공포.", e: "포모(FOMO)는 주린이를 파멸시키는 가장 큰 감정이야. 남들이 환호할 때가 가장 위험할 때란다." }, { q: "모든 자금을 한 종목에 거는 위험한 행위는?", a: "몰빵", options: ["몰빵", "자산 배분"], h: "계란을 한 바구니에 담으면?", e: "몰빵은 투자가 아니라 도박이야. 아무리 좋아 보여도 악재 하나에 모든 걸 잃을 수 있어." }, { q: "자산 중 일부를 늘 현금으로 보유해야 하는 이유는?", a: "기회 확보", options: ["기회 확보", "은행 이자가 좋아서"], h: "폭락장이 오면 '세일'이 시작되거든.", e: "현금도 종목이야. 하락장에서 현금이 있는 사냥꾼만이 남들이 버린 진주를 헐값에 주울 수 있지." }, { q: "손실 범위를 미리 정하고 대응하는 행위는?", a: "리스크 관리", options: ["리스크 관리", "운명 맡기기"], h: "방패를 먼저 준비하는 습관.", e: "공격보다 수비가 먼저야. 잃지 않는 매매를 반복하면 수익은 시장이 알아서 가져다준단다." }, { q: "수익이 났을 때 계획대로 팔아 수익을 확정 짓는 것은?", a: "익절", options: ["익절", "손절"], h: "줄 때 먹는 실력!", e: "목표가에 도달하면 욕심 없이 수익을 챙겨야 해. 내 주머니에 들어오기 전까진 내 돈이 아니야." }, { q: "투자를 방해하는 가장 무서운 적은 무엇인가?", a: "탐욕과 공포", options: ["탐욕과 공포", "낮은 지능"], h: "인간의 본능과 싸워야 해.", e: "남들이 겁낼 때 욕심내고, 남들이 욕심낼 때 겁을 내라. 워런 버핏이 매일 되새기는 말이지." }, { q: "사관학교 졸업생이 갖춰야 할 최고의 덕목은?", a: "원칙 준수", options: ["원칙 준수", "화려한 기술"], h: "멘토 재우가 100번 강조한 것!", e: "축하한다! 기술은 다 배웠어. 이제 네가 세운 원칙을 얼마나 차갑게 지키느냐가 승부를 가를 거다." } ] }
        ];

        let currentStageIdx = 0, currentQuestionIdx = 0, score = 0;
        let unlockedStages = parseInt(localStorage.getItem('unlockedStages')) || 1;
        let isAnswered = false;

        function init() { initTheme(); updateRankDisplay(); renderLobbyPath(); }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', saved);
            document.getElementById('theme-btn').innerText = saved === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-btn').innerText = next === 'dark' ? '☀️' : '🌙';
        }

        function updateRankDisplay() {
            const ranks = ["입문자", "분석가", "고래 사냥꾼", "프로 트레이더", "현명한 자산가"];
            const idx = Math.min(unlockedStages - 1, ranks.length - 1);
            document.getElementById('rank-display').innerText = ranks[idx];
        }

        function renderLobbyPath() {
            const list = document.getElementById('stage-path-list');
            list.innerHTML = '';
            quizDB.forEach((s, idx) => {
                const isUnlocked = (idx + 1) <= unlockedStages;
                const node = document.createElement('div');
                node.className = `stage-node ${isUnlocked ? 'unlocked' : 'locked'}`;
                node.innerHTML = `<span style="font-weight:900;">${idx + 1}</span><div class="stage-info"><h3>단계 0${s.stage}</h3><p>${s.title}</p></div>`;
                if(isUnlocked) node.onclick = () => startStage(idx);
                list.appendChild(node);
            });
        }

        function startStage(idx) {
            currentStageIdx = idx; currentQuestionIdx = 0; score = 0;
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            renderQuestion();
        }

        function typeWriter(text, elementId, speed = 40) {
            const element = document.getElementById(elementId);
            element.innerHTML = ''; let i = 0;
            function type() { if (i < text.length) { element.innerHTML += text.charAt(i); i++; setTimeout(type, speed); } }
            type();
        }

        function renderQuestion() {
            isAnswered = false;
            const data = quizDB[currentStageIdx].questions[currentQuestionIdx];
            document.getElementById('current-stage-title').innerText = `훈련 구역 0${currentStageIdx + 1}`;
            document.getElementById('question-count').innerText = `0${currentQuestionIdx + 1}/08`;
            document.getElementById('progress-fill').style.width = `${((currentQuestionIdx + 1) / 8) * 100}%`;
            typeWriter(data.q, 'question-text');
            document.getElementById('visual-element').innerText = ["💰", "📉", "📈", "🛡️", "🔱", "📊", "🧭", "🏆"][currentQuestionIdx % 8];
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'tactical-btn'; btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if(isAnswered) return; isAnswered = true;
            const data = quizDB[currentStageIdx].questions[currentQuestionIdx];
            const isCorrect = selected === data.a; if(isCorrect) score++;
            const modal = document.getElementById('result-modal');
            document.getElementById('modal-icon').innerText = isCorrect ? "🎯" : "🤔";
            document.getElementById('modal-title').innerText = isCorrect ? "정답이다!" : "분석 실패!";
            document.getElementById('modal-title').style.color = isCorrect ? "var(--success)" : "var(--danger)";
            document.getElementById('modal-explanation').innerHTML = `<b>정답: ${data.a}</b><br><br>${data.e}`;
            document.getElementById('modal-next-btn').innerText = (currentQuestionIdx === 7) ? "훈련 결과 확인" : "다음 문제로 →";
            modal.style.display = 'flex';
        }

        function handleModalNext() {
            document.getElementById('result-modal').style.display = 'none';
            if(currentQuestionIdx < 7) { currentQuestionIdx++; renderQuestion(); } else { showStageResult(); }
        }

        function showStageResult() {
            const passed = score >= 6;
            const modal = document.getElementById('stage-result-modal');
            document.getElementById('stage-result-score').innerText = `점수: ${score} / 08`;
            const btnArea = document.getElementById('stage-result-btns'); btnArea.innerHTML = '';
            if (passed) {
                document.getElementById('stage-result-icon').innerText = "🎖️";
                document.getElementById('stage-result-title').innerText = "임무 완료!";
                document.getElementById('stage-result-msg').innerText = "훌륭해. 다음 작전 구역으로 이동해도 좋아.";
                if(unlockedStages === (currentStageIdx + 1)) {
                    unlockedStages++; localStorage.setItem('unlockedStages', unlockedStages);
                    if(unlockedStages > 4) localStorage.setItem('jurini_rank', 'Graduated');
                    updateRankDisplay();
                }
                if (currentStageIdx < 3) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = "btn-confirm"; nextBtn.innerText = "다음 단계로 이동 →";
                    nextBtn.onclick = () => { modal.style.display = 'none'; startStage(currentStageIdx + 1); };
                    btnArea.appendChild(nextBtn);
                }
            } else {
                document.getElementById('stage-result-icon').innerText = "😫";
                document.getElementById('stage-result-title').innerText = "훈련 실패...";
                document.getElementById('stage-result-msg').innerText = "최소 6개 이상의 데이터를 맞춰야 통과할 수 있어.";
                const retryBtn = document.createElement('button');
                retryBtn.className = "btn-confirm"; retryBtn.innerText = "다시 도전하기";
                retryBtn.onclick = () => { modal.style.display = 'none'; startStage(currentStageIdx); };
                btnArea.appendChild(retryBtn);
            }
            const lobbyBtn = document.createElement('button');
            lobbyBtn.className = "tactical-btn"; lobbyBtn.style.textAlign = "center"; lobbyBtn.innerText = "스테이지 선택으로";
            lobbyBtn.onclick = () => { modal.style.display = 'none'; renderLobbyPath(); };
            btnArea.appendChild(lobbyBtn);
            modal.style.display = 'flex';
        }

        function openConfirmModal() { document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function goLobbyActual() { document.getElementById('confirm-modal').style.display = 'none'; renderLobbyPath(); }
        function openHintModal() {
            const data = quizDB[currentStageIdx].questions[currentQuestionIdx];
            document.getElementById('hint-text').innerText = `"${data.h}"`;
            document.getElementById('hint-modal').style.display = 'flex';
        }
        function closeHintModal() { document.getElementById('hint-modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
