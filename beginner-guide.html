    <style>
        :root {
            --primary: #FF5C00; --primary-hover: #FF7A30;
            --success: #00D9A3; --danger: #FF6B6B; --gold: #FFD700;
            --bg: #000; --card: #111; --card-hover: #161616;
            --border: #1e1e1e; --text: #fff;
            --secondary: #888; --muted: #444; --input-bg: #0a0a0a;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ── HEADER ── */
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: rgba(0,0,0,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.85rem 0; }
        nav { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.55rem; text-decoration: none; color: var(--text); font-weight: 800; font-size: 0.95rem; letter-spacing: 0.04em; text-transform: uppercase; }
        .logo-icon { background: var(--primary); width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .nav-links { display: flex; gap: 1.8rem; list-style: none; }
        .nav-links a { color: var(--secondary); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; position: relative; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 2px; background: var(--primary); border-radius: 2px; }

        /* ── MAIN ── */
        main { max-width: 1100px; margin: 0 auto; padding: 90px 2rem 60px; }

        /* ── PAGE HERO ── */
        .page-hero { margin-bottom: 2.2rem; }
        .page-badge { display: inline-flex; align-items: center; gap: 0.45rem; background: rgba(255,92,0,0.1); border: 1px solid rgba(255,92,0,0.28); color: var(--primary); padding: 0.35rem 0.9rem; border-radius: 50px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.9rem; }
        .badge-dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; display: inline-block; animation: blink 1.8s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
        .page-hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
        .page-hero p { color: var(--secondary); font-size: 0.95rem; }

        /* ── RANK CARD ── */
        .rank-row { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 22px; margin-bottom: 1.8rem; }
        .rank-left { display: flex; align-items: center; gap: 12px; }
        .rank-avatar { width: 44px; height: 44px; background: rgba(255,92,0,0.12); border: 1.5px solid rgba(255,92,0,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .rank-info-label { font-size: 0.68rem; color: var(--secondary); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; }
        .rank-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); color: var(--gold); padding: 4px 12px; border-radius: 20px; font-size: 0.82rem; font-weight: 800; }
        .rank-progress-wrap { flex: 1; max-width: 300px; }
        .rank-progress-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--secondary); margin-bottom: 6px; font-weight: 600; }
        .progress-bar-bg { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: width 0.5s ease; }
        .rank-stats { display: flex; gap: 20px; }
        .rank-stat { text-align: center; }
        .rank-stat-value { font-size: 1.2rem; font-weight: 800; color: var(--text); display: block; }
        .rank-stat-label { font-size: 0.65rem; color: var(--secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

        /* ── STAGE GRID ── */
        .stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 2rem; }
        @media (max-width: 900px) { .stage-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .stage-grid { grid-template-columns: 1fr; } .nav-links { display: none; } }
        .stage-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; position: relative; transition: all 0.22s; overflow: hidden; }
        .stage-card.unlocked { cursor: pointer; }
        .stage-card.unlocked:hover { border-color: rgba(255,92,0,0.4); transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        .stage-card.locked { opacity: 0.45; cursor: not-allowed; }
        .stage-card.completed { border-color: rgba(0,217,163,0.3); }
        .stage-card.completed::before { content: '✓'; position: absolute; top: 18px; right: 18px; width: 26px; height: 26px; background: rgba(0,217,163,0.12); border: 1px solid rgba(0,217,163,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: var(--success); }
        .stage-num-big { font-size: 4rem; font-weight: 900; color: var(--primary); opacity: 0.18; line-height: 1; margin-bottom: 0.6rem; font-variant-numeric: tabular-nums; }
        .stage-num-big.locked-num { color: var(--muted); }
        .stage-title-text { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.3rem; }
        .stage-desc-text { font-size: 0.8rem; color: var(--secondary); line-height: 1.5; margin-bottom: 1rem; }
        .stage-topics { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
        .topic-tag { background: rgba(255,92,0,0.08); border: 1px solid rgba(255,92,0,0.18); color: var(--primary); padding: 3px 9px; border-radius: 6px; font-size: 0.68rem; font-weight: 700; }
        .topic-tag.locked-tag { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--muted); }
        .stage-btn { width: 100%; padding: 11px; border-radius: 11px; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; border: none; }
        .stage-btn.active { background: var(--primary); color: #fff; }
        .stage-btn.active:hover { background: var(--primary-hover); }
        .stage-btn.done { background: rgba(0,217,163,0.12); color: var(--success); border: 1px solid rgba(0,217,163,0.25); }
        .stage-btn.disabled { background: var(--input-bg); color: var(--muted); cursor: not-allowed; }
        .lock-icon { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; opacity: 0.4; }

        /* ── QUIZ LAYOUT ── */
        #quiz-screen { display: none; }
        .quiz-layout { display: grid; grid-template-columns: 1fr 270px; gap: 1.4rem; }
        @media (max-width: 800px) { .quiz-layout { grid-template-columns: 1fr; } }

        /* Quiz left panel */
        .quiz-meta-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
        .quiz-stage-label { font-size: 0.7rem; font-weight: 700; color: var(--primary); letter-spacing: 0.08em; text-transform: uppercase; }
        .quiz-qcount { font-size: 0.8rem; font-weight: 700; color: var(--secondary); }
        .quiz-progress-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 1.2rem; }
        .quiz-progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s ease; }
        .visual-hud { background: var(--card); border: 1px solid var(--border); border-radius: 16px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; margin-bottom: 1rem; }
        .mentor-card { background: var(--input-bg); border: 1px solid var(--border); border-left: 3px solid var(--primary); border-radius: 14px; padding: 16px 18px; margin-bottom: 1.2rem; }
        .mentor-by { font-size: 0.65rem; font-weight: 700; color: var(--primary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; display: block; }
        .question-text { font-size: 1.05rem; font-weight: 700; line-height: 1.6; color: var(--text); min-height: 52px; }
        .options-grid { display: flex; flex-direction: column; gap: 0.7rem; }
        .option-btn { background: var(--card); border: 1.5px solid var(--border); padding: 15px 18px; border-radius: 13px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.18s; text-align: left; color: var(--text); font-family: 'DM Sans', sans-serif; }
        .option-btn:hover:not(:disabled) { border-color: rgba(255,92,0,0.4); background: rgba(255,92,0,0.05); color: var(--text); }
        .option-btn:disabled { cursor: default; }
        .option-btn.correct { background: rgba(0,217,163,0.1) !important; border-color: var(--success) !important; color: var(--success) !important; }
        .option-btn.wrong { background: rgba(255,107,107,0.1) !important; border-color: var(--danger) !important; color: var(--danger) !important; }
        .quiz-actions { display: flex; gap: 0.7rem; margin-top: 1rem; }
        .btn-hint { flex: 1; padding: 11px; border-radius: 11px; background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.2); color: var(--gold); font-weight: 700; font-size: 0.85rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-hint:hover { background: rgba(255,215,0,0.14); }
        .btn-quit { flex: 1; padding: 11px; border-radius: 11px; background: transparent; border: 1px solid var(--border); color: var(--secondary); font-weight: 700; font-size: 0.85rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-quit:hover { color: var(--danger); border-color: rgba(255,107,107,0.3); }

        /* Quiz right panel */
        .quiz-side { display: flex; flex-direction: column; gap: 1rem; }
        .side-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
        .side-label { font-size: 0.68rem; font-weight: 700; color: var(--secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .score-display { font-size: 2.5rem; font-weight: 900; color: var(--text); line-height: 1; margin-bottom: 4px; }
        .score-sub { font-size: 0.78rem; color: var(--secondary); }
        .streak-display { display: flex; align-items: center; gap: 6px; }
        .streak-num { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
        .streak-fire { font-size: 1.4rem; }
        .answer-log { max-height: 200px; overflow-y: auto; }
        .log-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
        .log-item:last-child { border-bottom: none; }
        .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .log-dot.ok { background: var(--success); }
        .log-dot.fail { background: var(--danger); }
        .log-text { color: var(--secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ── MODALS ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 500; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 32px; max-width: 420px; width: 100%; text-align: center; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-icon { font-size: 3.5rem; display: block; margin-bottom: 0.8rem; }
        .modal-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.4rem; }
        .modal-explanation { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: left; font-size: 0.88rem; line-height: 1.65; margin: 1rem 0; color: var(--secondary); }
        .modal-btn { background: var(--primary); color: #fff; border: none; padding: 13px; border-radius: 12px; font-weight: 700; font-size: 0.92rem; cursor: pointer; width: 100%; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 0.5rem; }
        .modal-btn:hover { background: var(--primary-hover); }
        .modal-btn-outline { background: transparent; color: var(--secondary); border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-weight: 600; font-size: 0.88rem; cursor: pointer; width: 100%; font-family: 'DM Sans', sans-serif; transition: all 0.2s; margin-top: 0.5rem; }
        .modal-btn-outline:hover { color: var(--text); border-color: #444; }
        .stage-result-score { font-size: 1.5rem; font-weight: 900; color: var(--primary); margin: 0.5rem 0; }
        .hint-text { background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.2); border-radius: 12px; padding: 16px; font-size: 1rem; font-weight: 700; color: var(--gold); font-style: italic; margin: 1rem 0; }
    
        /* ── 브랜드 로고 이미지 ── */
        .logo-img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: block;
            flex-shrink: 0;
        }
        </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html" class="logo">
            <img class="logo-img" src="logo.svg" alt="주린이 계산기 로고">
            주린이 계산기
        </a>
        <ul class="nav-links">
            <li><a href="average-calculator.html">평단가</a></li>
            <li><a href="mock-invest.html">모의투자</a></li>
            <li><a href="beginner-guide.html" class="active">사관학교</a></li>
            <li><a href="chart-simulator.html">차트 신내림</a></li>
        </ul>
        <div style="display:flex;align-items:center;gap:0.7rem;">
            <div id="auth-ui" style="display:flex;align-items:center;gap:0.75rem;">
                <button id="btn-login" class="auth-btn-nav">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                    로그인
                </button>
                <div id="user-info" style="display:none;align-items:center;">
                    <div class="auth-user-chip">
                        <div class="auth-avatar" id="user-avatar"></div>
                        <span id="user-name" class="auth-uname"></span>
                        <div class="auth-divider-v"></div>
                        <button id="btn-logout" class="auth-logout-link">로그아웃</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>

<main>
    <!-- LOBBY SCREEN -->
    <div id="lobby-screen">
        <div class="page-hero">
            <div class="page-badge"><span class="badge-dot"></span> Academy Mode</div>
            <h1>주식 사관학교</h1>
            <p>4개의 훈련 단계를 완수하고 진정한 투자자로 거듭나세요</p>
        </div>

        <!-- Rank Card -->
        <div class="rank-row">
            <div class="rank-left">
                <div class="rank-avatar" id="rank-avatar">🎖️</div>
                <div>
                    <div class="rank-info-label">나의 투자 등급</div>
                    <div class="rank-badge" id="rank-badge">⭐ 입문자</div>
                </div>
            </div>
            <div class="rank-progress-wrap">
                <div class="rank-progress-label">
                    <span>단계 진행도</span>
                    <span id="rank-progress-text">0 / 4 단계</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="rank-prog-fill" style="width:0%"></div>
                </div>
            </div>
            <div class="rank-stats">
                <div class="rank-stat">
                    <span class="rank-stat-value" id="stat-unlocked">1</span>
                    <span class="rank-stat-label">해금 단계</span>
                </div>
                <div class="rank-stat">
                    <span class="rank-stat-value" id="stat-total-q">0</span>
                    <span class="rank-stat-label">푼 문제</span>
                </div>
            </div>
        </div>

        <!-- Stage Grid -->
        <div class="stage-grid" id="stage-grid"></div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen">
        <div class="quiz-layout">
            <!-- Left: Question area -->
            <div>
                <div class="quiz-meta-bar">
                    <span class="quiz-stage-label" id="qs-stage-label">훈련 구역 01</span>
                    <span class="quiz-qcount" id="qs-q-count">01 / 08</span>
                </div>
                <div class="quiz-progress-track">
                    <div class="quiz-progress-fill" id="qs-progress" style="width:0%"></div>
                </div>
                <div class="visual-hud" id="qs-visual">💰</div>
                <div class="mentor-card">
                    <span class="mentor-by">📡 멘토 재우</span>
                    <div class="question-text" id="qs-question"></div>
                </div>
                <div class="options-grid" id="qs-options"></div>
                <div class="quiz-actions">
                    <button class="btn-hint" onclick="openHintModal()">💡 힌트</button>
                    <button class="btn-quit" onclick="openConfirmModal()">🚪 중단</button>
                </div>
            </div>
            <!-- Right: Stats panel -->
            <div class="quiz-side">
                <div class="side-card">
                    <span class="side-label">현재 점수</span>
                    <div class="score-display" id="qs-score">0</div>
                    <div class="score-sub" id="qs-score-sub">맞은 문제 / 총 문제</div>
                </div>
                <div class="side-card">
                    <span class="side-label">🔥 연속 정답</span>
                    <div class="streak-display">
                        <span class="streak-num" id="qs-streak">0</span>
                        <span class="streak-fire" id="qs-streak-fire"></span>
                    </div>
                </div>
                <div class="side-card">
                    <span class="side-label">답변 기록</span>
                    <div class="answer-log" id="qs-log"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Modals -->
<div class="modal-overlay" id="answer-modal">
    <div class="modal-box">
        <span class="modal-icon" id="am-icon">🎯</span>
        <div class="modal-title" id="am-title">정답!</div>
        <div class="modal-explanation" id="am-explanation"></div>
        <button class="modal-btn" id="am-next-btn" onclick="handleModalNext()">다음 문제 →</button>
    </div>
</div>

<div class="modal-overlay" id="stage-result-modal">
    <div class="modal-box">
        <span class="modal-icon" id="srm-icon">🎖️</span>
        <div class="modal-title" id="srm-title">임무 완료!</div>
        <div class="stage-result-score" id="srm-score">8 / 8</div>
        <div style="color:var(--secondary);font-size:0.88rem;margin-bottom:1.2rem;" id="srm-msg"></div>
        <div id="srm-btns"></div>
    </div>
</div>

<div class="modal-overlay" id="hint-modal">
    <div class="modal-box">
        <span class="modal-icon">💡</span>
        <div class="modal-title" style="color:var(--gold);">멘토의 힌트</div>
        <div class="hint-text" id="hint-content"></div>
        <button class="modal-btn" onclick="closeModal('hint-modal')">알겠습니다!</button>
    </div>
</div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal-box">
        <span class="modal-icon">⚠️</span>
        <div class="modal-title">훈련을 중단할까요?</div>
        <p style="color:var(--secondary);font-size:0.88rem;margin:0.8rem 0 1.2rem;">지금 나가면 이번 스테이지 성적은 저장되지 않습니다.</p>
        <button class="modal-btn" onclick="closeModal('confirm-modal')">계속하기</button>
        <button class="modal-btn-outline" onclick="goLobby()">훈련 중단</button>
    </div>
</div>

<script type="module" src="auth-modal.js"></script>

<script>
// ──────────────────────────────────────────
//  QUIZ DATA
// ──────────────────────────────────────────
let STAGES = [];
fetch("quiz.json")
    .then(r => r.json())
    .then(data => { STAGES = data; init(); })
    .catch(() => { console.warn("quiz.json 로드 실패"); init(); });

const RANKS = [
    { name: "입문자",        icon: "🌱", min: 0 },
    { name: "분析家",        icon: "📊", min: 1 },
    { name: "고래 사냥꾼",   icon: "🐋", min: 2 },
    { name: "프로 트레이더", icon: "⚡", min: 3 },
    { name: "경제 독해사",   icon: "🌏", min: 4 },
    { name: "기초 마스터",   icon: "🎓", min: 5 },
    { name: "분석 전문가",   icon: "🔬", min: 6 },
    { name: "투자의 왕",     icon: "👑", min: 7 },
    { name: "현명한 자산가", icon: "🏆", min: 8 },
];

let unlockedStages  = parseInt(localStorage.getItem('jurini_stages')) || 1;
let totalSolved     = parseInt(localStorage.getItem('jurini_total_q')) || 0;
let currentStageIdx = 0, currentQIdx = 0, score = 0, streak = 0;
let isAnswered = false, answerLog = [];

// ──── LOBBY ────
function init() {
    renderLobby();
}

function renderLobby() {
    // Rank display
    const completedStages = Math.max(0, unlockedStages - 1);
    const rankObj = RANKS[Math.min(completedStages, RANKS.length - 1)];
    document.getElementById('rank-badge').innerText = rankObj.icon + ' ' + rankObj.name;
    document.getElementById('rank-avatar').innerText = rankObj.icon;
    const totalStages = STAGES.length;
    document.getElementById('rank-progress-text').innerText = `${completedStages} / ${totalStages} 단계`;
    document.getElementById('rank-prog-fill').style.width = (completedStages / totalStages * 100) + '%';
    document.getElementById('stat-unlocked').innerText = unlockedStages;
    document.getElementById('stat-total-q').innerText = totalSolved;

    // Stage cards
    const grid = document.getElementById('stage-grid');
    grid.innerHTML = '';
    STAGES.forEach((s, idx) => {
        const unlocked  = (idx + 1) <= unlockedStages;
        const completed = (idx + 1) < unlockedStages;
        const div = document.createElement('div');
        div.className = 'stage-card ' + (unlocked ? 'unlocked' : 'locked') + (completed ? ' completed' : '');
        div.innerHTML = `
            ${!unlocked ? '<span class="lock-icon">🔒</span>' : ''}
            <div class="stage-num-big ${!unlocked ? 'locked-num' : ''}">${String(s.stage).padStart(2,'0')}</div>
            <div class="stage-title-text">${s.icon} ${s.title}</div>
            <div class="stage-desc-text">${s.desc}</div>
            <div class="stage-topics">
                ${s.topics.map(t => `<span class="topic-tag ${!unlocked ? 'locked-tag' : ''}">${t}</span>`).join('')}
            </div>
            <button class="stage-btn ${unlocked ? (completed ? 'done' : 'active') : 'disabled'}" ${!unlocked ? 'disabled' : ''}>
                ${completed ? '✓ 다시 도전' : (unlocked ? '훈련 시작 →' : '🔒 잠금')}
            </button>
        `;
        if (unlocked) div.onclick = () => startStage(idx);
        grid.appendChild(div);
    });
}

// ──── QUIZ ────
function startStage(idx) {
    currentStageIdx = idx; currentQIdx = 0; score = 0; streak = 0; answerLog = [];
    document.getElementById('lobby-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    isAnswered = false;
    const stage = STAGES[currentStageIdx];
    const q     = stage.questions[currentQIdx];

    const totalQs = stage.questions.length;
    document.getElementById('qs-stage-label').innerText = `훈련 구역 ${String(currentStageIdx + 1).padStart(2,'0')} · ${stage.title}`;
    document.getElementById('qs-q-count').innerText     = `${String(currentQIdx + 1).padStart(2, '0')} / ${String(totalQs).padStart(2, '0')}`;
    document.getElementById('qs-progress').style.width  = `${(currentQIdx + 1) / totalQs * 100}%`;
    document.getElementById('qs-visual').innerText      = ["💰", "📉", "📈", "🛡️", "🔱", "📊", "🧭", "🏆"][currentQIdx % 8];

    // Typewriter effect
    const el = document.getElementById('qs-question');
    el.innerText = '';
    let i = 0;
    const timer = setInterval(() => {
        if (i < q.q.length) { el.innerText += q.q[i]; i++; }
        else clearInterval(timer);
    }, 22);

    // Shuffle options
    const opts = [...q.options].sort(() => Math.random() - 0.5);
    const container = document.getElementById('qs-options');
    container.innerHTML = '';
    opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        container.appendChild(btn);
    });

    updateQuizSide();
}

function checkAnswer(selected) {
    if (isAnswered) return;
    isAnswered = true;
    const q = STAGES[currentStageIdx].questions[currentQIdx];
    const correct = selected === q.a;
    if (correct) { score++; streak++; totalSolved++; localStorage.setItem('jurini_total_q', totalSolved); }
    else { streak = 0; }

    // Mark buttons
    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === q.a) btn.classList.add('correct');
        else if (btn.innerText === selected && !correct) btn.classList.add('wrong');
    });

    // Log
    answerLog.unshift({ ok: correct, text: q.q.slice(0, 30) + '...' });
    updateQuizSide();

    // Modal
    const modal = document.getElementById('answer-modal');
    document.getElementById('am-icon').innerText   = correct ? '🎯' : '🤔';
    document.getElementById('am-title').innerText  = correct ? '정답!' : '틀렸어!';
    document.getElementById('am-title').style.color = correct ? 'var(--success)' : 'var(--danger)';
    document.getElementById('am-explanation').innerHTML = `<strong>정답: ${q.a}</strong><br><br>${q.e}`;
    document.getElementById('am-next-btn').innerText = (currentQIdx === STAGES[currentStageIdx].questions.length - 1) ? '결과 보기' : '다음 문제 →';
    openModal('answer-modal');
}

function handleModalNext() {
    closeModal('answer-modal');
    const totalQs = STAGES[currentStageIdx].questions.length;
    if (currentQIdx < totalQs - 1) { currentQIdx++; renderQuestion(); }
    else showStageResult();
}

function updateQuizSide() {
    document.getElementById('qs-score').innerText    = score;
    document.getElementById('qs-score-sub').innerText = `${score} 맞음 / ${currentQIdx + (isAnswered ? 1 : 0)} 문제`;
    document.getElementById('qs-streak').innerText   = streak;
    document.getElementById('qs-streak-fire').innerText = streak >= 3 ? '🔥' : streak >= 2 ? '✨' : '';
    const log = document.getElementById('qs-log');
    log.innerHTML = answerLog.slice(0, 8).map(l =>
        `<div class="log-item"><span class="log-dot ${l.ok ? 'ok' : 'fail'}"></span><span class="log-text">${l.text}</span></div>`
    ).join('') || '<span style="color:var(--muted);font-size:0.8rem;">아직 답변이 없습니다</span>';
}

function showStageResult() {
    const totalQs   = STAGES[currentStageIdx].questions.length;
    const passLine  = Math.round(totalQs * 0.7); // 70% to pass
    const passed    = score >= passLine;
    document.getElementById('srm-icon').innerText  = passed ? '🎖️' : '😤';
    document.getElementById('srm-title').innerText = passed ? '임무 완료!' : '훈련 실패...';
    document.getElementById('srm-score').innerText = `${score} / ${totalQs} 정답`;
    document.getElementById('srm-msg').innerText   = passed
        ? (score === totalQs ? '완벽한 성적이야! 모든 문제를 맞췄어.' : `훌륭해! ${passLine}개 기준을 통과했어. 다음 작전 구역으로!`)
        : `최소 ${passLine}개 이상 맞춰야 통과야. 다시 도전해보자!`;

    if (passed && unlockedStages === currentStageIdx + 1) {
        unlockedStages++;
        localStorage.setItem('jurini_stages', unlockedStages);
    }

    const btns = document.getElementById('srm-btns');
    btns.innerHTML = '';
    if (passed && currentStageIdx < STAGES.length - 1) {
        const next = document.createElement('button');
        next.className = 'modal-btn';
        next.innerText = '다음 단계로 →';
        next.onclick   = () => { closeModal('stage-result-modal'); startStage(currentStageIdx + 1); };
        btns.appendChild(next);
    } else if (!passed) {
        const retry = document.createElement('button');
        retry.className = 'modal-btn';
        retry.innerText = '다시 도전';
        retry.onclick   = () => { closeModal('stage-result-modal'); startStage(currentStageIdx); };
        btns.appendChild(retry);
    }
    const back = document.createElement('button');
    back.className = 'modal-btn-outline';
    back.innerText = '스테이지 선택으로';
    back.onclick   = () => { closeModal('stage-result-modal'); goLobby(); };
    btns.appendChild(back);
    openModal('stage-result-modal');
}

function goLobby() {
    closeModal('confirm-modal');
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('lobby-screen').style.display = 'block';
    renderLobby();
}

function openHintModal() {
    const q = STAGES[currentStageIdx].questions[currentQIdx];
    document.getElementById('hint-content').innerText = `"${q.h}"`;
    openModal('hint-modal');
}

function openConfirmModal() { openModal('confirm-modal'); }

function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
});

// init() is called by fetch callback above
</script>
    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
</html>
