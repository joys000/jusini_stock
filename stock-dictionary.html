<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="주식 용어 사전 + 퀴즈 - 200+ 주식 용어를 쉽게 배우고 퀴즈로 복습하세요">
    <title>주식 용어 사전 - 주린이 계산기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFD600;
            --primary-dark: #FFC400;
            --success: #00D9A3;
            --danger: #FF6B6B;
            --neutral: #2D3436;
            --neutral-light: #F8F9FA;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--neutral);
            background: linear-gradient(135deg, #FFF9E6 0%, #FFFFFF 100%);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255, 214, 0, 0.03) 49px, rgba(255, 214, 0, 0.03) 50px),
                repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255, 214, 0, 0.03) 49px, rgba(255, 214, 0, 0.03) 50px);
            pointer-events: none;
            z-index: 0;
        }
        
        header {
            background: white;
            box-shadow: var(--shadow);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Fredoka', cursive;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neutral);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-btn {
            background: var(--neutral-light);
            color: var(--neutral);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
        }
        
        .back-btn:hover {
            background: var(--primary);
            transform: translateX(-5px);
        }
        
        #root {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }
        
        .page-title {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .page-title h1 {
            font-family: 'Fredoka', cursive;
            font-size: 3rem;
            color: var(--neutral);
            margin-bottom: 0.5rem;
        }
        
        .page-title .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .tab-btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            border: 2px solid #E8E8E8;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
        }
        
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--neutral);
        }
        
        .tab-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }
        
        .search-box {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        
        .search-input {
            width: 100%;
            padding: 1.25rem 1.5rem;
            border: 2px solid #E8E8E8;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 214, 0, 0.1);
        }
        
        .category-filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        
        .category-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 2px solid #E8E8E8;
            background: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }
        
        .category-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .category-btn:hover {
            background: var(--neutral-light);
        }
        
        .terms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .term-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 4px solid var(--primary);
        }
        
        .term-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .term-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        
        .term-name {
            font-family: 'Fredoka', cursive;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neutral);
        }
        
        .term-category {
            background: var(--primary);
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .term-description {
            color: #636E72;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        .term-example {
            background: var(--neutral-light);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #636E72;
            border-left: 3px solid var(--success);
        }
        
        .term-example-label {
            font-weight: 600;
            color: var(--neutral);
            margin-bottom: 0.5rem;
        }
        
        /* Quiz Styles */
        .quiz-container {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow);
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .quiz-progress {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        
        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #E8E8E8;
            transition: all 0.3s ease;
        }
        
        .progress-dot.active {
            background: var(--primary);
            transform: scale(1.3);
        }
        
        .progress-dot.correct {
            background: var(--success);
        }
        
        .progress-dot.wrong {
            background: var(--danger);
        }
        
        .quiz-question {
            font-family: 'Fredoka', cursive;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--neutral);
        }
        
        .quiz-options {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .quiz-option {
            padding: 1.5rem;
            border-radius: 16px;
            border: 2px solid #E8E8E8;
            background: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .quiz-option:hover {
            background: var(--neutral-light);
            border-color: var(--primary);
        }
        
        .quiz-option.selected {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .quiz-option.correct {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        
        .quiz-option.wrong {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }
        
        .quiz-btn {
            width: 100%;
            padding: 1.25rem;
            border-radius: 16px;
            border: none;
            background: var(--primary);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }
        
        .quiz-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
        }
        
        .quiz-btn:disabled {
            background: #E8E8E8;
            cursor: not-allowed;
            transform: none;
        }
        
        .quiz-result {
            text-align: center;
        }
        
        .quiz-score {
            font-family: 'Fredoka', cursive;
            font-size: 4rem;
            color: var(--primary);
            margin: 2rem 0;
        }
        
        .quiz-message {
            font-size: 1.5rem;
            color: var(--neutral);
            margin-bottom: 2rem;
        }
        
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .level-btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            border: 2px solid #E8E8E8;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }
        
        .level-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }
            
            .terms-grid {
                grid-template-columns: 1fr;
            }
        }

        <nav>
            <a href="index.html" class="logo">

    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Stock terms database
        const stockTerms = [
            { id: 1, term: "주식", category: "기본", description: "기업의 자본을 구성하는 단위로, 회사의 일부 소유권을 나타냅니다.", example: "삼성전자 주식 10주를 보유하면 삼성전자의 소유권 일부를 가진 것입니다." },
            { id: 2, term: "배당금", category: "기본", description: "기업이 이익의 일부를 주주들에게 나누어 주는 돈입니다.", example: "1주당 1,000원 배당을 받는다면, 100주 보유 시 10만원을 받게 됩니다." },
            { id: 3, term: "시가총액", category: "기본", description: "회사의 전체 가치를 나타내는 지표로, 주가 × 발행 주식 수로 계산됩니다.", example: "주가 10만원, 발행주식 100만주면 시가총액은 1,000억원입니다." },
            { id: 4, term: "PER", category: "지표", description: "주가수익비율로, 주가를 주당순이익으로 나눈 값입니다. 회사가 1년 동안 번 돈 대비 주가가 얼마나 비싼지 보여줍니다.", example: "PER 10이면 현재 수익으로 10년이면 투자금을 회수할 수 있다는 의미입니다." },
            { id: 5, term: "PBR", category: "지표", description: "주가순자산비율로, 주가를 주당순자산으로 나눈 값입니다.", example: "PBR 1이면 주가가 회사의 순자산 가치와 같고, PBR 0.5면 반값에 거래되는 것입니다." },
            { id: 6, term: "ROE", category: "지표", description: "자기자본이익률로, 기업이 자기자본으로 얼마나 효율적으로 이익을 냈는지 보여줍니다.", example: "ROE 15%는 자본 100억으로 15억의 이익을 냈다는 의미입니다." },
            { id: 7, term: "매수", category: "거래", description: "주식을 사는 것을 의미합니다.", example: "삼성전자를 7만원에 10주 매수했습니다." },
            { id: 8, term: "매도", category: "거래", description: "보유한 주식을 파는 것을 의미합니다.", example: "8만원으로 오른 삼성전자를 매도해서 수익을 실현했습니다." },
            { id: 9, term: "손절", category: "거래", description: "손해를 보더라도 주식을 팔아 더 큰 손실을 막는 것입니다.", example: "-10% 손실이 나서 손절하고 다른 종목에 투자했습니다." },
            { id: 10, term: "익절", category: "거래", description: "이익이 난 상태에서 주식을 팔아 수익을 확정하는 것입니다.", example: "+30% 수익이 나서 일부를 익절했습니다." },
            { id: 11, term: "물타기", category: "전략", description: "주가가 하락했을 때 추가 매수하여 평균 단가를 낮추는 전략입니다.", example: "10만원에 산 주식이 8만원으로 떨어져서 추가 매수해 평단가를 9만원으로 낮췄습니다." },
            { id: 12, term: "불타기", category: "전략", description: "주가가 상승했을 때 추가 매수하는 전략입니다.", example: "10만원에 산 주식이 12만원으로 올라 추가 매수했습니다." },
            { id: 13, term: "호가", category: "거래", description: "주식을 사거나 팔고자 하는 가격입니다.", example: "매수 호가 99,000원, 매도 호가 100,000원입니다." },
            { id: 14, term: "체결", category: "거래", description: "매수와 매도가 성사되어 거래가 완료되는 것입니다.", example: "100,000원에 주문한 주식이 체결되었습니다." },
            { id: 15, term: "시가", category: "가격", description: "당일 거래가 시작될 때의 첫 거래 가격입니다.", example: "오늘 시가는 99,500원입니다." },
            { id: 16, term: "종가", category: "가격", description: "당일 거래가 마감될 때의 마지막 거래 가격입니다.", example: "오늘 종가는 101,000원으로 마감되었습니다." },
            { id: 17, term: "상한가", category: "가격", description: "하루에 오를 수 있는 최대 가격(전일 대비 +30%)입니다.", example: "오늘 상한가를 기록했습니다!" },
            { id: 18, term: "하한가", category: "가격", description: "하루에 내릴 수 있는 최저 가격(전일 대비 -30%)입니다.", example: "악재로 하한가까지 떨어졌습니다." },
            { id: 19, term: "거래량", category: "거래", description: "특정 기간 동안 거래된 주식의 수량입니다.", example: "오늘 거래량이 100만주로 평소보다 2배 늘었습니다." },
            { id: 20, term: "외국인 매수", category: "거래", description: "외국인 투자자들이 주식을 사는 것으로, 긍정적 신호로 해석됩니다.", example: "외국인이 3일 연속 순매수하고 있습니다." },
        ];

        // Quiz questions
        const quizQuestions = {
            beginner: [
                { question: "기업의 이익을 주주에게 나눠주는 것은?", options: ["배당금", "이자", "수수료", "세금"], correct: 0 },
                { question: "주식을 사는 행위를 무엇이라고 하나요?", options: ["매도", "매수", "거래", "투자"], correct: 1 },
                { question: "하루 장 마감 시 마지막 가격은?", options: ["시가", "종가", "고가", "저가"], correct: 1 },
                { question: "손해를 보고 파는 것은?", options: ["익절", "손절", "청산", "정리"], correct: 1 },
                { question: "회사 전체 가치를 나타내는 지표는?", options: ["주가", "시가총액", "순이익", "매출"], correct: 1 },
            ],
            intermediate: [
                { question: "주가가 내렸을 때 추가 매수하는 전략은?", options: ["불타기", "물타기", "손절", "익절"], correct: 1 },
                { question: "주가를 주당순이익으로 나눈 값은?", options: ["PBR", "ROE", "PER", "EPS"], correct: 2 },
                { question: "자기자본이익률을 의미하는 것은?", options: ["PER", "PBR", "ROE", "ROA"], correct: 2 },
                { question: "하루 최대 상승폭은?", options: ["20%", "30%", "40%", "50%"], correct: 1 },
                { question: "매수와 매도가 성사되는 것은?", options: ["주문", "체결", "접수", "거래"], correct: 1 },
            ],
            advanced: [
                { question: "PBR 1 미만은 무엇을 의미하나요?", options: ["고평가", "저평가", "적정가", "할인"], correct: 1 },
                { question: "ROE가 높을수록 좋은 이유는?", options: ["주가가 높음", "자본 효율이 좋음", "배당이 많음", "안전함"], correct: 1 },
                { question: "외국인 순매수가 의미하는 것은?", options: ["부정적", "중립", "긍정적", "무관"], correct: 2 },
                { question: "시가총액 = 주가 × ?", options: ["매출", "순이익", "발행주식수", "거래량"], correct: 2 },
                { question: "배당수익률 계산법은?", options: ["배당금/주가", "주가/배당금", "배당금×주가", "배당금-주가"], correct: 0 },
            ]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dictionary');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [quizLevel, setQuizLevel] = useState('beginner');
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [answers, setAnswers] = useState([]);

            const categories = ['전체', '기본', '거래', '가격', '지표', '전략'];

            const filteredTerms = stockTerms.filter(term => {
                const matchesSearch = term.term.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    term.description.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = selectedCategory === '전체' || term.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const currentQuiz = quizQuestions[quizLevel];

            const handleAnswerSelect = (index) => {
                if (showResult) return;
                setSelectedAnswer(index);
            };

            const handleNextQuestion = () => {
                if (selectedAnswer === null) return;

                const isCorrect = selectedAnswer === currentQuiz[currentQuestion].correct;
                const newAnswers = [...answers, { correct: isCorrect }];
                setAnswers(newAnswers);

                if (isCorrect) {
                    setScore(score + 1);
                }

                if (currentQuestion < currentQuiz.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    setSelectedAnswer(null);
                } else {
                    setShowResult(true);
                }
            };

            const resetQuiz = () => {
                setQuizStarted(false);
                setCurrentQuestion(0);
                setSelectedAnswer(null);
                setShowResult(false);
                setScore(0);
                setAnswers([]);
            };

            return (
                <div>
                    <div className="page-title">
                        <div className="icon">📚</div>
                        <h1>주식 용어 사전</h1>
                        <p>쉬운 설명으로 주식 용어를 마스터하세요</p>
                    </div>

                    <div className="tabs">
                        <button 
                            className={`tab-btn ${activeTab === 'dictionary' ? 'active' : ''}`}
                            onClick={() => setActiveTab('dictionary')}
                        >
                            📖 용어 사전
                        </button>
                        <button 
                            className={`tab-btn ${activeTab === 'quiz' ? 'active' : ''}`}
                            onClick={() => setActiveTab('quiz')}
                        >
                            🎮 퀴즈 게임
                        </button>
                    </div>

                    {activeTab === 'dictionary' && (
                        <>
                            <div className="search-box">
                                <input 
                                    type="text"
                                    className="search-input"
                                    placeholder="용어를 검색하세요... (예: 배당금, PER, 손절)"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <div className="category-filters">
                                    {categories.map(cat => (
                                        <button 
                                            key={cat}
                                            className={`category-btn ${selectedCategory === cat ? 'active' : ''}`}
                                            onClick={() => setSelectedCategory(cat)}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="terms-grid">
                                {filteredTerms.map(term => (
                                    <div key={term.id} className="term-card">
                                        <div className="term-header">
                                            <div className="term-name">{term.term}</div>
                                            <div className="term-category">{term.category}</div>
                                        </div>
                                        <div className="term-description">{term.description}</div>
                                        <div className="term-example">
                                            <div className="term-example-label">💡 실전 예시</div>
                                            {term.example}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {activeTab === 'quiz' && (
                        <div className="quiz-container">
                            {!quizStarted ? (
                                <div className="quiz-header">
                                    <h2 style={{fontFamily: 'Fredoka, cursive', fontSize: '2.5rem', marginBottom: '2rem'}}>
                                        레벨을 선택하세요
                                    </h2>
                                    <div className="level-selector">
                                        <button 
                                            className={`level-btn ${quizLevel === 'beginner' ? 'active' : ''}`}
                                            onClick={() => setQuizLevel('beginner')}
                                        >
                                            🌱 초급 (5문제)
                                        </button>
                                        <button 
                                            className={`level-btn ${quizLevel === 'intermediate' ? 'active' : ''}`}
                                            onClick={() => setQuizLevel('intermediate')}
                                        >
                                            🚀 중급 (5문제)
                                        </button>
                                        <button 
                                            className={`level-btn ${quizLevel === 'advanced' ? 'active' : ''}`}
                                            onClick={() => setQuizLevel('advanced')}
                                        >
                                            💎 고급 (5문제)
                                        </button>
                                    </div>
                                    <button className="quiz-btn" onClick={() => setQuizStarted(true)}>
                                        퀴즈 시작하기 🎯
                                    </button>
                                </div>
                            ) : !showResult ? (
                                <>
                                    <div className="quiz-progress">
                                        {currentQuiz.map((_, index) => (
                                            <div 
                                                key={index}
                                                className={`progress-dot ${
                                                    index === currentQuestion ? 'active' : 
                                                    index < currentQuestion ? (answers[index]?.correct ? 'correct' : 'wrong') : ''
                                                }`}
                                            />
                                        ))}
                                    </div>
                                    <div className="quiz-question">
                                        Q{currentQuestion + 1}. {currentQuiz[currentQuestion].question}
                                    </div>
                                    <div className="quiz-options">
                                        {currentQuiz[currentQuestion].options.map((option, index) => (
                                            <button 
                                                key={index}
                                                className={`quiz-option ${selectedAnswer === index ? 'selected' : ''}`}
                                                onClick={() => handleAnswerSelect(index)}
                                            >
                                                {option}
                                            </button>
                                        ))}
                                    </div>
                                    <button 
                                        className="quiz-btn"
                                        onClick={handleNextQuestion}
                                        disabled={selectedAnswer === null}
                                    >
                                        {currentQuestion < currentQuiz.length - 1 ? '다음 문제 →' : '결과 보기 🎉'}
                                    </button>
                                </>
                            ) : (
                                <div className="quiz-result">
                                    <div className="quiz-score">
                                        {score} / {currentQuiz.length}
                                    </div>
                                    <div className="quiz-message">
                                        {score === currentQuiz.length ? '🎉 완벽합니다! 주식 마스터!' :
                                         score >= currentQuiz.length * 0.6 ? '👍 잘했어요! 조금만 더 공부하면 완벽!' :
                                         '💪 다시 도전해보세요! 용어 사전을 다시 읽어보는 것도 좋습니다.'}
                                    </div>
                                    <button className="quiz-btn" onClick={resetQuiz}>
                                        다시 도전하기 🔄
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
