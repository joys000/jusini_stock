<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 용어사전 | 주린이 계산기</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --card: #111;
            --card2: #0d0d0d;
            --border: #1e1e1e;
            --primary: #FF5C00;
            --primary-hover: #FF7A30;
            --text: #fff;
            --secondary: #888;
            --success: #00D9A3;
            --danger: #FF6B6B;
            --gold: #FFD600;
            --input-bg: #0a0a0a;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

        /* ═══ HEADER ═══ */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            background: rgba(0,0,0,0.96); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); height: 64px;
            display: flex; align-items: center; padding: 0 28px;
            justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 800; font-size: 1.05rem; }
        .logo-icon { width: 30px; height: 30px; background: var(--primary); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
        .nav-links { display: flex; gap: 2px; align-items: center; }
        .nav-links a { color: var(--secondary); text-decoration: none; padding: 7px 13px; border-radius: 7px; font-size: 0.83rem; font-weight: 500; transition: all 0.18s; white-space: nowrap; }
        .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        .nav-links a.active { color: var(--primary); }

        /* ═══ MAIN ═══ */
        .page-body { padding-top: 80px; }
        main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 60px; }

        /* ═══ HERO ═══ */
        .page-hero { margin-bottom: 32px; }
        .page-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,92,0,0.1); border: 1px solid rgba(255,92,0,0.28); color: var(--primary); padding: 5px 14px; border-radius: 50px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
        .badge-dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; display: inline-block; animation: blink 1.8s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
        .page-hero h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
        .page-hero p { color: var(--secondary); font-size: 0.95rem; }

        /* ═══ TAB BAR ═══ */
        .tab-bar { display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 28px; width: fit-content; }
        .tab-btn { padding: 9px 22px; border-radius: 9px; border: none; background: transparent; color: var(--secondary); font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.18s; }
        .tab-btn.active { background: var(--primary); color: #fff; }

        /* ═══ SEARCH + FILTER ═══ */
        .search-row { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
        .search-wrap { position: relative; flex: 1; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
        .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px 12px 42px; color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.18s; }
        .search-input:focus { border-color: rgba(255,92,0,0.5); }
        .search-input::placeholder { color: #444; }
        .terms-count { font-size: 0.8rem; color: var(--secondary); white-space: nowrap; font-weight: 600; }

        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .cat-btn { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 6px 14px; color: var(--secondary); font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.18s; }
        .cat-btn:hover { border-color: rgba(255,92,0,0.4); color: var(--text); }
        .cat-btn.active { background: rgba(255,92,0,0.1); border-color: rgba(255,92,0,0.4); color: var(--primary); }

        /* ═══ TERMS GRID ═══ */
        .terms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
        .term-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
        .term-card:hover { border-color: rgba(255,92,0,0.3); border-left-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .term-card.expanded { border-left-color: var(--primary); background: #131313; }
        .tc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .tc-name { font-size: 1.15rem; font-weight: 800; }
        .tc-cat { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 9px; border-radius: 5px; }
        .cat-기본 { background: rgba(255,92,0,0.1); color: var(--primary); }
        .cat-거래 { background: rgba(0,217,163,0.1); color: var(--success); }
        .cat-가격 { background: rgba(255,214,0,0.1); color: var(--gold); }
        .cat-지표 { background: rgba(167,139,250,0.1); color: #a78bfa; }
        .cat-전략 { background: rgba(251,146,60,0.1); color: #fb923c; }
        .cat-차트 { background: rgba(56,189,248,0.1); color: #38bdf8; }
        .cat-경제 { background: rgba(244,114,182,0.1); color: #f472b6; }
        .tc-desc { font-size: 0.87rem; color: #bbb; line-height: 1.6; margin-bottom: 10px; }
        .tc-example { background: var(--input-bg); border: 1px solid var(--border); border-left: 2px solid var(--success); border-radius: 8px; padding: 10px 13px; font-size: 0.82rem; color: var(--secondary); line-height: 1.55; }
        .tc-example-label { font-size: 0.68rem; font-weight: 700; color: var(--success); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
        .tc-expand-detail { display: none; margin-top: 12px; }
        .term-card.expanded .tc-expand-detail { display: block; }
        .tc-tip { background: rgba(255,92,0,0.05); border: 1px solid rgba(255,92,0,0.15); border-radius: 8px; padding: 10px 13px; font-size: 0.82rem; color: #ddd; line-height: 1.55; }
        .tc-tip-label { font-size: 0.68rem; font-weight: 700; color: var(--primary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--secondary); }
        .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 16px; }

        /* ═══ QUIZ SECTION ═══ */
        .quiz-wrap { max-width: 720px; }
        .quiz-levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
        .level-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .level-card:hover { border-color: rgba(255,92,0,0.35); }
        .level-card.active { border-color: var(--primary); background: rgba(255,92,0,0.06); }
        .level-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
        .level-name { font-size: 0.95rem; font-weight: 800; margin-bottom: 4px; }
        .level-sub { font-size: 0.75rem; color: var(--secondary); }
        .btn-quiz-start { background: var(--primary); border: none; border-radius: 10px; padding: 14px 32px; color: #fff; font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; margin-bottom: 28px; }
        .btn-quiz-start:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* Quiz in progress */
        .quiz-game { display: none; }
        .qg-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .qg-label { font-size: 0.75rem; font-weight: 700; color: var(--primary); letter-spacing: 0.08em; text-transform: uppercase; }
        .qg-count { font-size: 0.8rem; font-weight: 700; color: var(--secondary); }
        .qg-progress-bg { height: 4px; background: #1a1a1a; border-radius: 4px; margin-bottom: 20px; }
        .qg-progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s ease; }
        .qg-visual { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; font-size: 2.8rem; margin-bottom: 14px; }
        .qg-question-box { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--primary); border-radius: 14px; padding: 18px 20px; margin-bottom: 18px; }
        .qg-question-tag { font-size: 0.68rem; font-weight: 700; color: var(--primary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
        .qg-question-text { font-size: 1.05rem; font-weight: 700; line-height: 1.6; min-height: 50px; }
        .qg-options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
        .qg-opt { background: var(--card); border: 1.5px solid var(--border); border-radius: 11px; padding: 14px 18px; font-family: inherit; font-size: 0.93rem; font-weight: 600; cursor: pointer; transition: all 0.18s; text-align: left; color: var(--text); }
        .qg-opt:hover:not(:disabled) { border-color: rgba(255,92,0,0.4); background: rgba(255,92,0,0.05); }
        .qg-opt:disabled { cursor: default; }
        .qg-opt.correct { background: rgba(0,217,163,0.1); border-color: var(--success); color: var(--success); }
        .qg-opt.wrong { background: rgba(255,107,107,0.1); border-color: var(--danger); color: var(--danger); }
        .qg-explanation { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-size: 0.85rem; color: var(--secondary); line-height: 1.65; margin-bottom: 14px; display: none; }
        .qg-explanation.show { display: block; }
        .qg-streak { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .streak-num { font-size: 1.6rem; font-weight: 900; color: var(--primary); }
        .btn-qg-next { width: 100%; background: var(--primary); border: none; border-radius: 10px; padding: 14px; color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 800; cursor: pointer; transition: background 0.2s; display: none; }
        .btn-qg-next.show { display: block; }
        .btn-qg-next:hover { background: var(--primary-hover); }

        /* Quiz result */
        .quiz-result { display: none; text-align: center; }
        .qr-icon { font-size: 4rem; display: block; margin-bottom: 16px; }
        .qr-score { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
        .qr-msg { color: var(--secondary); font-size: 0.95rem; margin-bottom: 28px; line-height: 1.6; }
        .qr-btns { display: flex; flex-direction: column; gap: 10px; }
        .btn-qr { background: var(--primary); border: none; border-radius: 10px; padding: 14px; color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-qr:hover { background: var(--primary-hover); }
        .btn-qr-out { background: transparent; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--secondary); font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.18s; }
        .btn-qr-out:hover { border-color: #444; color: var(--text); }
        .qr-breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        .qr-stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
        .qr-stat-val { font-size: 1.5rem; font-weight: 900; display: block; margin-bottom: 4px; }
        .qr-stat-lbl { font-size: 0.72rem; font-weight: 700; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.06em; }

        @media (max-width: 800px) {
            .terms-grid { grid-template-columns: 1fr; }
            .quiz-levels { grid-template-columns: 1fr; }
            header { padding: 0 16px; }
            .nav-links a { padding: 7px 8px; font-size: 0.78rem; }
            .page-hero h1 { font-size: 1.9rem; }
        }
    
        /* ── 브랜드 로고 이미지 ── */
        .logo-img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: block;
            flex-shrink: 0;
        }
        </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
    <a href="index.html" class="logo">
        <img class="logo-img" src="logo.svg" alt="주린이 계산기 로고">
        주린이 계산기
    </a>
    <nav class="nav-links">
        <a href="index.html">홈</a>
        <a href="average-calculator.html">평단가</a>
        <a href="mock-invest.html">모의투자</a>
        <a href="beginner-guide.html">사관학교</a>
        <a href="stock-dictionary.html" class="active">용어사전</a>
        <a href="chart-simulator.html">차트 신내림</a>
    </nav>
</header>

<div class="page-body">
<main>
    <!-- HERO -->
    <div class="page-hero">
        <div class="page-badge"><span class="badge-dot"></span> Stock Dictionary</div>
        <h1>📚 주식 용어사전</h1>
        <p>60개 이상의 핵심 주식 용어를 익히고 퀴즈로 실력을 검증하세요</p>
    </div>

    <!-- TABS -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('dict', this)">📖 용어 사전</button>
        <button class="tab-btn" onclick="switchTab('quiz', this)">🎮 퀴즈 게임</button>
    </div>

    <!-- ── DICTIONARY TAB ── -->
    <div id="dict-tab">
        <div class="search-row">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="용어 검색... (예: PER, 손절, 캔들)" oninput="filterTerms()">
            </div>
            <span class="terms-count" id="terms-count">60개 용어</span>
        </div>
        <div class="filter-row" id="filter-row"></div>
        <div class="terms-grid" id="terms-grid"></div>
    </div>

    <!-- ── QUIZ TAB ── -->
    <div id="quiz-tab" style="display:none;">
        <div class="quiz-wrap">
            <!-- Level selector -->
            <div id="quiz-setup">
                <div class="quiz-levels" id="quiz-levels">
                    <div class="level-card active" data-level="beginner" onclick="selectLevel('beginner', this)">
                        <span class="level-icon">🌱</span>
                        <div class="level-name">입문</div>
                        <div class="level-sub">기초 용어 10문제</div>
                    </div>
                    <div class="level-card" data-level="intermediate" onclick="selectLevel('intermediate', this)">
                        <span class="level-icon">🚀</span>
                        <div class="level-name">중급</div>
                        <div class="level-sub">응용 개념 10문제</div>
                    </div>
                    <div class="level-card" data-level="advanced" onclick="selectLevel('advanced', this)">
                        <span class="level-icon">💎</span>
                        <div class="level-name">고급</div>
                        <div class="level-sub">심화 실전 10문제</div>
                    </div>
                </div>
                <button class="btn-quiz-start" onclick="startQuiz()">⚡ 퀴즈 시작하기</button>
            </div>

            <!-- Quiz in progress -->
            <div class="quiz-game" id="quiz-game">
                <div class="qg-meta">
                    <span class="qg-label" id="qg-level-label">입문</span>
                    <span class="qg-count" id="qg-count">1 / 10</span>
                </div>
                <div class="qg-progress-bg">
                    <div class="qg-progress-fill" id="qg-progress" style="width:10%"></div>
                </div>
                <div class="qg-visual" id="qg-visual">💰</div>
                <div class="qg-question-box">
                    <div class="qg-question-tag">📡 문제</div>
                    <div class="qg-question-text" id="qg-question">문제 텍스트</div>
                </div>
                <div class="qg-options" id="qg-options"></div>
                <div class="qg-explanation" id="qg-explanation"></div>
                <button class="btn-qg-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
            </div>

            <!-- Quiz result -->
            <div class="quiz-result" id="quiz-result">
                <span class="qr-icon" id="qr-icon">🏆</span>
                <div class="qr-score" id="qr-score">8 / 10</div>
                <div class="qr-breakdown">
                    <div class="qr-stat">
                        <span class="qr-stat-val" id="qr-correct" style="color:var(--success)">0</span>
                        <span class="qr-stat-lbl">정답</span>
                    </div>
                    <div class="qr-stat">
                        <span class="qr-stat-val" id="qr-wrong" style="color:var(--danger)">0</span>
                        <span class="qr-stat-lbl">오답</span>
                    </div>
                    <div class="qr-stat">
                        <span class="qr-stat-val" id="qr-streak-max" style="color:var(--primary)">0🔥</span>
                        <span class="qr-stat-lbl">최대 연속</span>
                    </div>
                </div>
                <div class="qr-msg" id="qr-msg">수고했어요!</div>
                <div class="qr-btns">
                    <button class="btn-qr" onclick="retryQuiz()">🔄 같은 레벨 다시 도전</button>
                    <button class="btn-qr-out" onclick="resetQuiz()">레벨 선택으로 돌아가기</button>
                </div>
            </div>
        </div>
    </div>
</main>
</div>

<script>
// ═══ TERMS DATABASE (60+ terms) ═══
const TERMS = [
    // 기본
    { id:1, term:"주식", cat:"기본", desc:"기업의 자본을 구성하는 단위. 주식을 보유하면 해당 기업의 일부 소유권(지분)을 갖게 됩니다.", ex:"삼성전자 100주 보유 = 삼성전자의 미세한 공동 소유주!", tip:"주식은 '내 돈을 그 기업의 미래에 베팅하는 것'이야. 기업이 성장하면 주가도 오르고, 망하면 휴지 조각이 돼." },
    { id:2, term:"배당금", cat:"기본", desc:"기업이 이익의 일부를 주주들에게 현금으로 나눠주는 것. 은행 이자처럼 보유 주식에 비례해서 지급됩니다.", ex:"1주당 1,000원 배당 × 100주 보유 = 10만원 배당 수령", tip:"배당수익률 = 주당 배당금 ÷ 주가. 안정적인 고배당주는 노후 파이프라인이 되기도 해." },
    { id:3, term:"시가총액", cat:"기본", desc:"주가 × 발행 주식수. 회사를 통째로 사려면 필요한 돈. 기업 규모를 비교하는 핵심 지표입니다.", ex:"주가 8만원 × 발행주식 59억주 = 삼성전자 시가총액 약 480조원", tip:"시총 1조 이상이 '대형주', 그 미만은 중소형주로 분류돼. 시총이 작을수록 변동성도 커." },

        { q:"0~100 사이 값으로 과매수/과매도 구간을 나타내는 지표는?", opts:["MACD","볼린저밴드","RSI","이평선"], a:2, exp:"RSI 70 이상은 과매수, 30 이하는 과매도 구간이에요. 단, 강한 추세장에서는 오래 유지되기도 해요.", vis:"📏" },
        { q:"당기순이익 ÷ 발행주식수로 계산되는 주당 수익 지표는?", opts:["PER","PBR","EPS","ROA"], a:2, exp:"EPS(주당순이익)는 1주가 1년에 벌어들인 돈이에요. PER 계산의 기본 재료예요.", vis:"💹" },
        { q:"목표 자산 배분 비율 유지를 위해 포트폴리오를 재조정하는 것은?", opts:["분산투자","리밸런싱","헤지","풀매수"], a:1, exp:"리밸런싱은 자동으로 '비싼 건 팔고, 싼 건 사는' 원칙을 실행해요. 분기 또는 연 1회가 좋아요.", vis:"⚖️" },
        { q:"주가 변동성 기대치를 나타내는 지수로 '공포지수'로 불리는 것은?", opts:["FOMC","VIX","QE","EPS"], a:1, exp:"VIX가 40 이상이면 극도의 공포 상태. 역설적으로 좋은 매수 기회가 됐던 역사적 사례가 많아요.", vis:"😱" },
    ],
    advanced: [
        { q:"PBR 0.7의 의미로 가장 적절한 것은?", opts:["주가가 순자산보다 30% 저평가","주가가 순자산보다 30% 고평가","부채가 자산의 70%","EPS가 0.7"], a:0, exp:"PBR 1 미만 = 주가가 순자산보다 낮게 거래. 이론상 청산하면 더 돈을 받을 수 있는 상태예요.", vis:"📊" },
        { q:"금리 인상 시 가장 먼저 타격을 받는 주식 유형은?", opts:["배당주","가치주","성장주(기술주)","자원주"], a:2, exp:"성장주 가치는 미래 현금흐름의 현재 가치인데, 금리가 오르면 할인율이 커져 가치가 급감해요.", vis:"📈" },
        { q:"기업의 임원이 자사 주식 매수 시 제출해야 하는 미국 SEC 공시 서류는?", opts:["Form 10-K","Form S-1","Form 4","Form 8-K"], a:2, exp:"Form 4는 내부자 거래 공시 서류로 2일 이내 제출 의무가 있어요. 내부자 매수 추적의 핵심이에요.", vis:"📋" },
        { q:"RSI가 80을 오랫동안 유지하는 상황의 의미로 가장 적절한 것은?", opts:["즉시 매도 신호","강한 상승 추세 유지","주가 하락 임박","정확히 고점"], a:1, exp:"강한 추세장에서는 RSI가 오래 70+ 유지될 수 있어요. 지표를 맹신하지 말고 추세와 함께 봐야 해요.", vis:"🔥" },
        { q:"볼린저밴드 수축(밴드 폭 축소)이 의미하는 것은?", opts:["주가 안정","큰 변동성 임박","하락 추세 시작","매수 신호"], a:1, exp:"볼린저밴드 수축은 에너지 응축이에요. 곧 큰 움직임이 올 확률이 높고, 방향이 핵심이에요.", vis:"⚡" },
        { q:"공매도 잔고가 높은 주식이 갑자기 급등할 때 발생하는 현상은?", opts:["데드크로스","숏스퀴즈","배당락","주식 분할"], a:1, exp:"숏스퀴즈는 공매도 세력이 패닉 상태로 강제 청산하며 주가를 폭등시키는 현상이에요. 게임스탑이 대표 사례.", vis:"💥" },
        { q:"경기 사이클에 따라 강세 섹터가 이동하는 현상은?", opts:["리밸런싱","섹터 로테이션","포트폴리오 분산","매집"], a:1, exp:"경기 확장기 → 소비재·기술 강세, 금리 인상기 → 금융·에너지 강세처럼 스마트 머니가 이동해요.", vis:"🌍" },
        { q:"연준이 채권을 매입해 시중에 돈을 풀어 경기를 부양하는 정책은?", opts:["기준금리 인상","양적완화(QE)","FOMC","배당락"], a:1, exp:"양적완화(QE)는 중앙은행이 직접 채권을 사서 유동성을 공급하는 방식이에요. 주가에 강한 호재예요.", vis:"🖨️" },
        { q:"배당락일에 주가가 하락하는 이유로 가장 적절한 것은?", opts:["회사가 어려워서","배당을 받을 권리가 없어지기 때문","공매도 세력 때문","프로그램 매도 때문"], a:1, exp:"배당락일에 배당금만큼 이론적으로 주가가 하락해요. '배당금 선취' 효과가 사라지는 것이에요.", vis:"📅" },
        { q:"주가 상승 시 거래량도 함께 증가하는 패턴의 의미는?", opts:["속임수 상승(페이크)","신뢰할 수 있는 진짜 상승","단기 반등","기관 매도"], a:1, exp:"거래량을 동반한 상승은 진짜야. 거래량 없는 상승은 허수일 가능성이 높아요. 항상 거래량을 확인하세요!", vis:"📢" },
    ]
};

// ═══ GLOBAL STATE ═══
let currentCategory = '전체';
let currentQuizLevel = 'beginner';
let quizQuestions = [];
let quizIdx = 0, quizScore = 0, quizStreak = 0, quizMaxStreak = 0, quizAnswered = false;
const CATEGORIES = ['전체','기본','거래','가격','지표','전략','차트','경제'];

// ═══ INIT ═══
function init() {
    renderFilters();
    filterTerms();
}

function renderFilters() {
    const row = document.getElementById('filter-row');
    row.innerHTML = CATEGORIES.map(c => `<button class="cat-btn ${c === '전체' ? 'active' : ''}" onclick="setCategory('${c}', this)">${c}</button>`).join('');
}

function setCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    filterTerms();
}

function filterTerms() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = TERMS.filter(t => {
        const matchCat = currentCategory === '전체' || t.cat === currentCategory;
        const matchQ = !query || t.term.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query);
        return matchCat && matchQ;
    });
    document.getElementById('terms-count').textContent = filtered.length + '개 용어';
    const grid = document.getElementById('terms-grid');
    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><span class="emoji">🔍</span><div>검색 결과가 없습니다.</div></div>';
        return;
    }
    grid.innerHTML = filtered.map(t => `
        <div class="term-card" id="tc-${t.id}" onclick="toggleCard(${t.id})">
            <div class="tc-top">
                <div class="tc-name">${t.term}</div>
                <span class="tc-cat cat-${t.cat}">${t.cat}</span>
            </div>
            <div class="tc-desc">${t.desc}</div>
            <div class="tc-example">
                <div class="tc-example-label">💡 실전 예시</div>
                ${t.ex}
            </div>
            <div class="tc-expand-detail">
                <div class="tc-tip">
                    <div class="tc-tip-label">🧙 멘토 팁</div>
                    ${t.tip}
                </div>
            </div>
        </div>
    `).join('');
}

function toggleCard(id) {
    const card = document.getElementById('tc-' + id);
    card.classList.toggle('expanded');
}

// ═══ TAB SWITCHING ═══
function switchTab(tab, el) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('dict-tab').style.display = tab === 'dict' ? 'block' : 'none';
    document.getElementById('quiz-tab').style.display = tab === 'quiz' ? 'block' : 'none';
}

// ═══ QUIZ ═══
function selectLevel(level, el) {
    currentQuizLevel = level;
    document.querySelectorAll('.level-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

function startQuiz() {
    quizQuestions = [...QUIZ[currentQuizLevel]].sort(() => Math.random() - 0.5);
    quizIdx = 0; quizScore = 0; quizStreak = 0; quizMaxStreak = 0;
    document.getElementById('quiz-setup').style.display = 'none';
    document.getElementById('quiz-result').style.display = 'none';
    document.getElementById('quiz-game').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    quizAnswered = false;
    const q = quizQuestions[quizIdx];
    const total = quizQuestions.length;
    const levelLabels = { beginner:'🌱 입문', intermediate:'🚀 중급', advanced:'💎 고급' };
    document.getElementById('qg-level-label').textContent = levelLabels[currentQuizLevel];
    document.getElementById('qg-count').textContent = `${quizIdx + 1} / ${total}`;
    document.getElementById('qg-progress').style.width = `${((quizIdx + 1) / total) * 100}%`;
    document.getElementById('qg-visual').textContent = q.vis;

    // Typewriter
    const el = document.getElementById('qg-question');
    el.textContent = '';
    let i = 0;
    const t = setInterval(() => {
        if (i < q.q.length) { el.textContent += q.q[i++]; }
        else clearInterval(t);
    }, 20);

    // Options (shuffled per question but keep track of correct)
    const shuffledOpts = q.opts.map((txt, idx) => ({ txt, isCorrect: idx === q.a })).sort(() => Math.random() - 0.5);
    const container = document.getElementById('qg-options');
    container.innerHTML = shuffledOpts.map((opt, i) => `
        <button class="qg-opt" onclick="checkAnswer(this, ${opt.isCorrect})">${opt.txt}</button>
    `).join('');

    document.getElementById('qg-explanation').className = 'qg-explanation';
    document.getElementById('qg-explanation').textContent = '';
    document.getElementById('btn-next').className = 'btn-qg-next';
    document.getElementById('btn-next').textContent = quizIdx < quizQuestions.length - 1 ? '다음 문제 →' : '결과 보기 🎉';
}

function checkAnswer(btn, isCorrect) {
    if (quizAnswered) return;
    quizAnswered = true;

    document.querySelectorAll('.qg-opt').forEach(b => {
        b.disabled = true;
        if (b === btn) b.classList.add(isCorrect ? 'correct' : 'wrong');
        // highlight correct answer if wrong
        const btnIsCorrect = b.onclick && b.onclick.toString().includes('true');
    });
    // Highlight all correct buttons
    document.querySelectorAll('.qg-opt').forEach(b => {
        const onclick = b.getAttribute('onclick');
        if (onclick && onclick.includes('true')) b.classList.add('correct');
    });

    if (isCorrect) {
        quizScore++;
        quizStreak++;
        if (quizStreak > quizMaxStreak) quizMaxStreak = quizStreak;
    } else {
        quizStreak = 0;
    }

    const q = quizQuestions[quizIdx];
    const expEl = document.getElementById('qg-explanation');
    expEl.innerHTML = `<strong>${isCorrect ? '✅ 정답!' : '❌ 틀렸어요!'}</strong> ${q.exp}`;
    expEl.className = 'qg-explanation show';
    document.getElementById('btn-next').className = 'btn-qg-next show';
}

function nextQuestion() {
    quizIdx++;
    if (quizIdx < quizQuestions.length) {
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-game').style.display = 'none';
    const result = document.getElementById('quiz-result');
    result.style.display = 'block';

    const total = quizQuestions.length;
    const wrong = total - quizScore;
    const pct = Math.round((quizScore / total) * 100);

    document.getElementById('qr-score').textContent = `${quizScore} / ${total}`;
    document.getElementById('qr-correct').textContent = quizScore;
    document.getElementById('qr-wrong').textContent = wrong;
    document.getElementById('qr-streak-max').textContent = quizMaxStreak + '🔥';

    let icon, msg;
    if (pct === 100) { icon = '🏆'; msg = '완벽합니다! 진짜 주린이 마스터예요. 용어 실력만큼은 프로 트레이더급이에요!'; }
    else if (pct >= 80) { icon = '🎯'; msg = '훌륭해요! 거의 다 맞췄어요. 틀린 문제는 용어사전을 다시 확인해보세요.'; }
    else if (pct >= 60) { icon = '📚'; msg = '절반 이상 맞췄어요! 조금 더 공부하면 다음엔 완벽하게 맞출 수 있을 거예요.'; }
    else { icon = '💪'; msg = '다시 도전해보세요! 용어사전을 먼저 쭉 읽어보면 훨씬 쉬워질 거예요.'; }
    document.getElementById('qr-icon').textContent = icon;
    document.getElementById('qr-msg').textContent = msg;
}

function retryQuiz() {
    document.getElementById('quiz-result').style.display = 'none';
    startQuiz();
}

function resetQuiz() {
    document.getElementById('quiz-result').style.display = 'none';
    document.getElementById('quiz-game').style.display = 'none';
    document.getElementById('quiz-setup').style.display = 'block';
}

init();
</script>
</body>
</html>
