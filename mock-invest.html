<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전 모의투자 HUD | 주린이 인텔리전스</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD600; --primary-dark: #FFC400; --primary-glow: rgba(255, 214, 0, 0.3);
            --success: #00D9A3; --danger: #FF6B6B; --bg: #F8F9FA;
            --card-bg: #FFFFFF; --text: #2D3436; --secondary: #636E72;
            --border: #E8E8E8;
        }

        [data-theme="dark"] {
            --bg: #0A0B10; --card-bg: #1E202D; --text: #E8E8E8;
            --secondary: #B0B0B0; --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            transition: 0.3s; min-height: 100vh; padding: 20px;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        header { max-width: 1200px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Fredoka', cursive; font-size: 1.5rem; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 10px; }
        
        .dashboard-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }

        .card { background: var(--card-bg); border-radius: 30px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.05); position: relative; }
        .card h2 { font-family: 'Fredoka', cursive; font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* 📡 멘토 HUD */
        .mentor-hud { background: rgba(0,0,0,0.03); padding: 20px; border-radius: 20px; margin-bottom: 25px; border-left: 5px solid var(--primary); }
        .asset-main { display: flex; justify-content: space-between; align-items: flex-end; }
        .total-label { font-size: 0.8rem; color: var(--secondary); font-weight: 800; display: block; margin-bottom: 5px; }
        .total-value { font-size: 2.2rem; font-weight: 800; font-family: 'Fredoka'; color: var(--text); }

        /* 🔍 검색 및 매수창 */
        .search-area { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-weight: 700; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--card-bg); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100; max-height: 250px; overflow-y: auto; border: 1px solid var(--border); display: none; }
        .res-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .res-item:hover { background: var(--primary-glow); }

        .trade-controls { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-top: 15px; }
        .btn-buy { background: var(--success); color: white; border: none; padding: 0 25px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        /* 💼 포트폴리오 리스트 */
        .holding-card { background: var(--bg); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .stock-info h4 { font-family: 'Fredoka'; font-size: 1.2rem; }
        .profit-pill { padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; margin-top: 5px; display: inline-block; }
        .sell-input { width: 80px !important; padding: 8px !important; margin-right: 10px; text-align: center; }

        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; }

        @media (max-width: 950px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="light">

    <header>
        <a href="index.html" class="logo">📊 <span>실전 모의투자 HUD</span></a>
        <div style="display: flex; gap: 10px;">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
            <button class="theme-toggle" onclick="location.href='index.html'">🏠</button>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="main-col">
            <div class="card">
                <div class="mentor-hud">
                    <span style="font-weight:900; color:var(--primary-dark); font-size:0.7rem; display:block; margin-bottom:8px; letter-spacing:1px;">📡 MENTOR JAEWOO</span>
                    <p id="mentor-advice" style="font-size:0.9rem; font-weight:600;">"실시간 시세가 반영되고 있다. 뇌동매매 하지 말고 차트를 봐!"</p>
                </div>
                <div class="asset-main">
                    <div>
                        <span class="total-label">총 평가 자산 (KRW)</span>
                        <div class="total-value" id="total-asset">₩10,000,000</div>
                    </div>
                    <div style="text-align: right;">
                        <span class="total-label">가용 현금</span>
                        <div style="font-size: 1.3rem; font-weight: 800; color: var(--success);" id="cash-balance">₩10,000,000</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>📈 종목 매수</h2>
                <div class="search-area">
                    <input type="text" id="search-input" placeholder="종목명 또는 티커 입력 (예: TSLA, Apple)" autocomplete="off">
                    <div id="search-results" class="search-results"></div>
                </div>
                <div class="trade-controls">
                    <div id="selected-info" style="font-weight: 800; display: flex; align-items: center; background: var(--bg); padding: 0 15px; border-radius: 12px; border: 1px solid var(--border);">
                        선택된 종목 없음
                    </div>
                    <input type="number" id="buy-qty" placeholder="수량 (주)">
                    <button class="btn-buy" onclick="buyStock()">즉시 매수</button>
                </div>
                <p id="trade-msg" style="margin-top:15px; font-size:0.8rem; font-weight:700; color:var(--secondary);"></p>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>💼 보유 주식 관리</h2>
                    <button onclick="refreshAllPrices()" style="background:var(--bg); border:1px solid var(--border); padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:800; font-size:0.8rem;">🔄 시세 강제 갱신</button>
                </div>
                <div id="portfolio-list">
                    <p style="text-align:center; color:var(--secondary); padding:40px;">보유중인 주식이 없습니다. 전장에 참여하세요!</p>
                </div>
            </div>
        </div>

        <div class="side-col">
            <div class="card" style="text-align: center;">
                <h3>자산 구성 비중</h3>
                <div style="height: 250px; margin-top: 20px;">
                    <canvas id="assetChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h3>최근 거래 장부</h3>
                <div id="trade-history" style="font-size: 0.8rem; color: var(--secondary); margin-top: 15px; line-height: 1.8;">
                    기록 없음
                </div>
                <button onclick="resetData()" style="width:100%; margin-top:20px; background:none; border:none; color:var(--danger); text-decoration:underline; font-size:0.8rem; cursor:pointer;">전체 투자 데이터 초기화</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'd70u9vhr01ql6rg0mgr0d70u9vhr01ql6rg0mgrg';
        const EX_RATE = 1350; // 실시간 API 연동 가능하나 일단 고정
        
        let db = { cash: 10000000, holdings: {}, history: [] };
        let selectedStock = null;
        let chart = null;

        function init() {
            const saved = localStorage.getItem('jurini_mock_v2');
            if(saved) db = JSON.parse(saved);
            initTheme();
            updateUI();
            setupSearch();
            setInterval(refreshAllPrices, 60000); // 1분마다 자동 갱신
        }

        // --- 🔍 검색 로직 (메인과 동일) ---
        function setupSearch() {
            const input = document.getElementById('search-input');
            const results = document.getElementById('search-results');
            let timer;

            input.addEventListener('input', () => {
                clearTimeout(timer);
                const q = input.value.trim();
                if(!q) { results.style.display = 'none'; return; }

                timer = setTimeout(async () => {
                    const res = await fetch(`https://finnhub.io/api/v1/search?q=${q}&token=${API_KEY}`);
                    const data = await res.json();
                    if(data.result) {
                        results.innerHTML = data.result.slice(0, 5).map(i => `
                            <div class="res-item" onclick="selectStock('${i.symbol}', '${i.description}')">
                                <strong>${i.symbol}</strong> | ${i.description}
                            </div>
                        `).join('');
                        results.style.display = 'block';
                    }
                }, 300);
            });
        }

        async function selectStock(symbol, name) {
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('search-input').value = symbol;
            
            const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
            const data = await res.json();
            
            if(data.c) {
                selectedStock = { symbol, name, price: Math.round(data.c * EX_RATE) };
                document.getElementById('selected-info').innerText = `${symbol} (₩${selectedStock.price.toLocaleString()})`;
            }
        }

        // --- 💹 매매 로직 ---
        function buyStock() {
            const qty = parseInt(document.getElementById('buy-qty').value);
            if(!selectedStock || !qty || qty <= 0) return alert("종목과 수량을 확인해라!");

            const total = selectedStock.price * qty;
            if(db.cash < total) return alert("현금이 부족하다! '총알' 장전하고 와라.");

            db.cash -= total;
            if(db.holdings[selectedStock.symbol]) {
                const h = db.holdings[selectedStock.symbol];
                h.avg = ((h.avg * h.qty) + total) / (h.qty + qty);
                h.qty += qty;
            } else {
                db.holdings[selectedStock.symbol] = { qty: qty, avg: selectedStock.price, cur: selectedStock.price, name: selectedStock.name };
            }

            db.history.unshift(`[매수] ${selectedStock.symbol} ${qty}주 / ₩${selectedStock.price.toLocaleString()}`);
            saveAndRefresh();
            document.getElementById('buy-qty').value = '';
        }

        function sellStock(symbol, isAll = false) {
            const h = db.holdings[symbol];
            let sellQty = isAll ? h.qty : parseInt(document.getElementById(`sell-qty-${symbol}`).value);

            if(!sellQty || sellQty <= 0 || sellQty > h.qty) return alert("수량이 올바르지 않다!");

            const sellVal = h.cur * sellQty;
            db.cash += sellVal;
            h.qty -= sellQty;

            db.history.unshift(`[매도] ${symbol} ${sellQty}주 / ₩${h.cur.toLocaleString()}`);
            if(h.qty === 0) delete db.holdings[symbol];

            saveAndRefresh();
        }

        // --- 📊 UI 및 차트 ---
        async function refreshAllPrices() {
            for(let sym in db.holdings) {
                const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${API_KEY}`);
                const data = await res.json();
                if(data.c) db.holdings[sym].cur = Math.round(data.c * EX_RATE);
            }
            updateUI();
        }

        function updateUI() {
            let stockTotal = 0;
            const list = document.getElementById('portfolio-list');
            list.innerHTML = '';

            for(let sym in db.holdings) {
                const h = db.holdings[sym];
                const val = h.cur * h.qty;
                stockTotal += val;
                const profit = val - (h.avg * h.qty);
                const rate = (profit / (h.avg * h.qty) * 100).toFixed(2);
                const color = profit >= 0 ? 'var(--success)' : 'var(--danger)';

                list.innerHTML += `
                    <div class="holding-card">
                        <div class="stock-info">
                            <h4>${sym} <small style="font-size:0.7rem; color:var(--secondary);">${h.name}</small></h4>
                            <div class="profit-pill" style="background:${color}20; color:${color}">
                                ${profit >= 0 ? '▲' : '▼'} ${Math.abs(profit).toLocaleString()} (${rate}%)
                            </div>
                            <div style="font-size:0.8rem; margin-top:5px; color:var(--secondary)">
                                ${h.qty}주 / 평단 ₩${Math.round(h.avg).toLocaleString()} / 현재 ₩${h.cur.toLocaleString()}
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:900; font-size:1.1rem; margin-bottom:10px;">₩${val.toLocaleString()}</div>
                            <div style="display:flex; align-items:center;">
                                <input type="number" id="sell-qty-${sym}" class="sell-input" placeholder="수량">
                                <button onclick="sellStock('${sym}')" style="background:var(--neutral); color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:700; margin-right:5px;">매도</button>
                                <button onclick="sellStock('${sym}', true)" style="background:none; border:1px solid var(--border); padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:700;">전량</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('cash-balance').innerText = `₩${db.cash.toLocaleString()}`;
            document.getElementById('total-asset').innerText = `₩${(db.cash + stockTotal).toLocaleString()}`;
            document.getElementById('trade-history').innerHTML = db.history.slice(0, 6).map(h => `<div>• ${h}</div>`).join('') || "기록 없음";
            
            updateChart(db.cash, stockTotal);
        }

        function updateChart(cash, stock) {
            const ctx = document.getElementById('assetChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['현금', '주식'],
                    datasets: [{ data: [cash, stock], backgroundColor: ['#FFD600', '#00D9A3'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function saveAndRefresh() {
            localStorage.setItem('jurini_mock_v2', JSON.stringify(db));
            updateUI();
        }

        function resetData() {
            if(confirm("모든 투자 기록을 삭제하고 1,000만원으로 다시 시작할까?")) {
                localStorage.removeItem('jurini_mock_v2');
                location.reload();
            }
        }

        function toggleTheme() {
            const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-btn').innerText = next === 'dark' ? '☀️' : '🌙';
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', saved);
            document.getElementById('theme-btn').innerText = saved === 'dark' ? '☀️' : '🌙';
        }

        init();
    </script>
</body>
</html>
