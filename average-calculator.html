<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략 평단가 계산기 | 주린이 인텔리전스</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD600; --primary-dark: #FFC400; --primary-glow: rgba(255, 214, 0, 0.3);
            --success: #00D9A3; --danger: #FF6B6B; --bg: #F8F9FA;
            --card-bg: #FFFFFF; --text: #2D3436; --secondary: #636E72;
            --border: #E8E8E8;
        }

        [data-theme="dark"] {
            --bg: #0A0B10; --card-bg: #1E202D; --text: #E8E8E8;
            --secondary: #B0B0B0; --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            transition: 0.3s; min-height: 100vh; padding: 20px;
        }

        header { max-width: 1200px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Fredoka', cursive; font-size: 1.5rem; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 10px; }
        
        .app-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; }

        .card { background: var(--card-bg); border-radius: 30px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        .card h2 { font-family: 'Fredoka', cursive; font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* 📡 멘토 브리핑 */
        .mentor-briefing { background: rgba(0,0,0,0.03); padding: 18px; border-radius: 20px; margin-bottom: 25px; border-left: 5px solid var(--primary); }
        .typewriter { font-size: 0.9rem; font-weight: 600; line-height: 1.6; min-height: 3.5em; }

        /* 입력 그룹 최적화 */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 800; margin-bottom: 8px; color: var(--secondary); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-weight: 700; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }

        .btn-unit { padding: 5px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 0.7rem; cursor: pointer; color: var(--secondary); transition: 0.2s; }
        .btn-unit:hover { background: var(--primary); color: #000; }

        .btn-add { background: var(--primary); color: #000; border: none; padding: 0 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-reset { position: absolute; top: 30px; right: 30px; background: none; border: none; color: var(--danger); text-decoration: underline; font-size: 0.8rem; cursor: pointer; }

        /* 통화 스위치 */
        .currency-switch { display: flex; background: var(--bg); padding: 5px; border-radius: 10px; gap: 5px; margin-bottom: 20px; }
        .cur-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; background: none; color: var(--secondary); transition: 0.3s; }
        .cur-btn.active { background: var(--card-bg); color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 분석 보드 */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--bg); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-label { font-size: 0.7rem; color: var(--secondary); font-weight: 700; }
        .stat-value { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-top: 5px; font-family: 'Fredoka'; }

        /* 결과 연출 */
        .profit-badge { text-align: center; padding: 30px; border-radius: 25px; background: var(--bg); border: 2px solid var(--border); margin-bottom: 25px; transition: 0.3s; }
        .profit-val { font-size: 2.8rem; font-weight: 900; font-family: 'Fredoka'; }

        .target-box { background: rgba(0, 217, 163, 0.05); border: 1px solid var(--success); padding: 20px; border-radius: 20px; margin-top: 20px; }
        .target-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: var(--bg); border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; border: 1px solid var(--border); }
        .btn-del { color: var(--danger); font-weight: 800; cursor: pointer; border: none; background: none; }

        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; }

        @media (max-width: 900px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="light">

    <header>
        <a href="index.html" class="logo">📊 <span>전략 평단가 계산기</span></a>
        <div style="display: flex; gap: 10px;">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
            <button class="theme-toggle" onclick="location.href='index.html'">🏠</button>
        </div>
    </header>

    <div class="app-container">
        <div class="left-col">
            <div class="card">
                <button class="btn-reset" onclick="resetAll()">전체 초기화</button>
                <div class="mentor-briefing">
                    <span style="font-weight:900; color:var(--primary-dark); font-size:0.7rem; display:block; margin-bottom:5px;">📡 MENTOR JAEWOO</span>
                    <p id="mentor-msg" class="typewriter"></p>
                </div>

                <div class="currency-switch">
                    <button class="cur-btn active" id="cur-krw" onclick="setCurrency('KRW')">🇰🇷 원화 (₩)</button>
                    <button class="cur-btn" id="cur-usd" onclick="setCurrency('USD')">🇺🇸 달러 ($)</button>
                </div>

                <h2>➕ 매수 내역 입력</h2>
                <div class="input-group">
                    <div class="input-row">
                        <div>
                            <label id="label-price">매수가 (₩)</label>
                            <input type="number" id="price-in" placeholder="0">
                            <div style="margin-top: 5px; display: flex; gap: 4px;">
                                <button class="btn-unit" onclick="adjustInput('price-in', 100)">+100</button>
                                <button class="btn-unit" onclick="adjustInput('price-in', 1000)">+1k</button>
                                <button class="btn-unit" onclick="adjustInput('price-in', 10000)">+10k</button>
                            </div>
                        </div>
                        <div>
                            <label>수량 (주)</label>
                            <input type="number" id="shares-in" placeholder="0">
                            <div style="margin-top: 5px; display: flex; gap: 4px;">
                                <button class="btn-unit" onclick="adjustInput('shares-in', 1)">+1</button>
                                <button class="btn-unit" onclick="adjustInput('shares-in', 10)">+10</button>
                                <button class="btn-unit" onclick="adjustInput('shares-in', 100)">+100</button>
                            </div>
                        </div>
                        <button class="btn-add" onclick="addPosition()" style="height: 48px; margin-top: 24px;">추가</button>
                    </div>
                </div>

                <div class="purchase-list" id="pos-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px;"></div>

                <div class="target-box">
                    <h3 style="font-size: 0.9rem; font-weight: 800; color: var(--success);">🎯 목표 탈출 시뮬레이션</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 700; color: var(--secondary);">희망 평단가</label>
                            <input type="number" id="target-avg" placeholder="목표 평단" oninput="runCalculations()">
                        </div>
                        <div style="background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center;">
                            <span style="font-size: 0.7rem; display: block; color: var(--secondary);">필요 추가 매수</span>
                            <strong id="req-shares" style="font-size: 1.1rem; color: var(--success);">0</strong>주
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="card">
                <h2>📈 전략 분석 리포트</h2>
                
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-label">최종 평균단가</div><div class="stat-value" id="res-avg">0</div></div>
                    <div class="stat-box"><div class="stat-label">총 보유 수량</div><div class="stat-value" id="res-total-shares">0</div></div>
                    <div class="stat-box"><div class="stat-label">총 투자 금액</div><div class="stat-value" id="res-total-cost">0</div></div>
                    <div class="stat-box"><div class="stat-label">현재 주가</div><input type="number" id="current-price" style="margin-top:5px; border:none; background:none; padding:0; font-size:1.2rem; height:auto;" placeholder="입력..." oninput="runCalculations()"></div>
                </div>

                <div class="profit-badge" id="profit-card">
                    <div class="stat-label">실시간 예상 손익</div>
                    <div id="res-profit" class="profit-val">0</div>
                    <div id="res-rate" style="font-weight: 800; font-size: 1.3rem; margin-top: 5px;">0.00%</div>
                </div>

                <div class="target-box" style="background: rgba(255, 214, 0, 0.05); border-color: var(--primary);">
                    <h3 style="font-size: 0.9rem; font-weight: 800; color: var(--primary-dark);">💰 목표 수익 매도가 계산</h3>
                    <div class="target-row">
                        <span style="font-size: 0.85rem; font-weight: 600;">원하는 수익률 (%)</span>
                        <input type="number" id="target-profit-rate" value="5" style="width: 80px; text-align: center;" oninput="runCalculations()">
                    </div>
                    <div class="target-row" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);">
                        <strong>예상 매도 가격</strong>
                        <strong id="target-sell-price" style="font-size: 1.3rem; color: var(--primary-dark);">0</strong>
                    </div>
                </div>

                <div style="height: 200px; margin-top: 25px;">
                    <canvas id="avgChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let positions = [];
        let currency = 'KRW';
        let chart = null;

        function init() {
            const saved = localStorage.getItem('avg_positions_v3');
            if(saved) positions = JSON.parse(saved);
            typeWriter("어설픈 물타기는 파산을 부른다. 정확한 '탈출 지점'과 '목표가'를 설정해라. 멘토 재우가 끝까지 돕지.", "mentor-msg");
            renderUI();
            initTheme();
        }

        function typeWriter(text, elementId) {
            const el = document.getElementById(elementId); el.innerHTML = '';
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; }
                else clearInterval(timer);
            }, 30);
        }

        function setCurrency(cur) {
            currency = cur;
            document.getElementById('cur-krw').classList.toggle('active', cur === 'KRW');
            document.getElementById('cur-usd').classList.toggle('active', cur === 'USD');
            document.getElementById('label-price').innerText = `매수가 (${cur === 'KRW' ? '₩' : '$'})`;
            runCalculations();
        }

        function adjustInput(id, val) {
            const el = document.getElementById(id);
            el.value = (parseFloat(el.value) || 0) + val;
            if(id === 'price-in' || id === 'shares-in') {} else { runCalculations(); }
        }

        function addPosition() {
            const p = parseFloat(document.getElementById('price-in').value);
            const s = parseFloat(document.getElementById('shares-in').value);
            if(!p || !s) return;
            positions.push({ price: p, shares: s, id: Date.now() });
            document.getElementById('price-in').value = '';
            document.getElementById('shares-in').value = '';
            renderUI();
        }

        function deletePosition(id) {
            positions = positions.filter(pos => pos.id !== id);
            renderUI();
        }

        function resetAll() {
            if(confirm("모든 내역을 삭제할까?")) {
                positions = [];
                localStorage.removeItem('avg_positions_v3');
                location.reload();
            }
        }

        function format(num) {
            if (currency === 'KRW') return Math.round(num).toLocaleString() + '원';
            return '$' + num.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function renderUI() {
            localStorage.setItem('avg_positions_v3', JSON.stringify(positions));
            const list = document.getElementById('pos-list');
            list.innerHTML = positions.map(pos => `
                <div class="list-item">
                    <span><strong>${format(pos.price)}</strong> / ${pos.shares}주</span>
                    <button class="btn-del" onclick="deletePosition(${pos.id})">삭제</button>
                </div>
            `).join('');
            runCalculations();
        }

        function runCalculations() {
            if(positions.length === 0) return;

            const totalShares = positions.reduce((acc, cur) => acc + cur.shares, 0);
            const totalCost = positions.reduce((acc, cur) => acc + (cur.price * cur.shares), 0);
            const avgPrice = totalCost / totalShares;
            const curPrice = parseFloat(document.getElementById('current-price').value) || 0;

            document.getElementById('res-avg').innerText = format(avgPrice);
            document.getElementById('res-total-shares').innerText = totalShares.toLocaleString() + '주';
            document.getElementById('res-total-cost').innerText = format(totalCost);

            // 손익 계산
            if(curPrice > 0) {
                const profit = (curPrice * totalShares) - totalCost;
                const rate = (profit / totalCost) * 100;
                document.getElementById('res-profit').innerText = (profit > 0 ? '+' : '') + format(profit);
                document.getElementById('res-rate').innerText = (profit > 0 ? '+' : '') + rate.toFixed(2) + '%';
                document.getElementById('profit-card').style.borderColor = profit >= 0 ? 'var(--success)' : 'var(--danger)';
                document.getElementById('res-profit').style.color = profit >= 0 ? 'var(--success)' : 'var(--danger)';
                document.getElementById('res-rate').style.color = profit >= 0 ? 'var(--success)' : 'var(--danger)';
            }

            // 탈출 시뮬레이션
            const target = parseFloat(document.getElementById('target-avg').value);
            if(target && curPrice > 0) {
                let req = (target * totalShares - totalCost) / (curPrice - target);
                document.getElementById('req-shares').innerText = req > 0 ? Math.ceil(req).toLocaleString() : '0';
            }

            // 목표 수익가 계산
            const targetRate = parseFloat(document.getElementById('target-profit-rate').value) || 0;
            const targetSell = avgPrice * (1 + targetRate / 100);
            document.getElementById('target-sell-price').innerText = format(targetSell);

            updateChart(avgPrice, curPrice);
        }

        function updateChart(avg, cur) {
            const ctx = document.getElementById('avgChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['현재 평단', '현재 주가'],
                    datasets: [{
                        data: [avg, cur],
                        backgroundColor: ['#FFD600', cur >= avg ? '#00D9A3' : '#FF6B6B'],
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function toggleTheme() {
            const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-btn').innerText = next === 'dark' ? '☀️' : '🌙';
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', saved);
            document.getElementById('theme-btn').innerText = saved === 'dark' ? '☀️' : '🌙';
        }

        init();
    </script>
</body>
</html>
