<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략 평단가 계산기 (Cloud) | 주린이 인텔리전스</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD600; --primary-dark: #FFC400;
            --success: #00D9A3; --danger: #FF6B6B; --bg: #F8F9FA;
            --card-bg: #FFFFFF; --text: #2D3436; --secondary: #636E72;
            --border: #E8E8E8;
        }
        [data-theme="dark"] {
            --bg: #0A0B10; --card-bg: #1E202D; --text: #E8E8E8;
            --secondary: #B0B0B0; --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; min-height: 100vh; padding: 20px; }
        header { max-width: 1200px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Fredoka', cursive; font-size: 1.5rem; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 10px; }
        
        /* 🔑 로그인 UI */
        .auth-status { display: flex; align-items: center; gap: 12px; }
        .btn-auth { background: var(--card-bg); border: 2px solid var(--primary); padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .btn-auth:hover { background: var(--primary); transform: translateY(-2px); }

        .app-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; }
        .card { background: var(--card-bg); border-radius: 30px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .mentor-msg { background: rgba(255, 214, 0, 0.05); padding: 15px; border-radius: 15px; border-left: 5px solid var(--primary); margin-bottom: 25px; font-size: 0.9rem; font-weight: 600; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-weight: 700; outline: none; margin-top: 8px; }
        .btn-add { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--bg); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .profit-banner { text-align: center; padding: 25px; border-radius: 25px; background: var(--bg); border: 2px solid var(--border); margin: 20px 0; }
        
        @media (max-width: 900px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">📊 <span>평단가 계산기</span></a>
        <div class="auth-status">
            <button id="btn-login" class="btn-auth">🔑 구글 로그인</button>
            <div id="user-info" style="display: none; align-items: center; gap: 10px;">
                <span id="user-name" style="font-weight: 800;"></span>
                <button id="btn-logout" style="border:none; background:none; color:var(--danger); cursor:pointer; text-decoration:underline; font-size:0.8rem;">로그아웃</button>
            </div>
            <button class="btn-auth" style="border-radius: 50%; width: 40px; padding: 0;" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <div class="app-container">
        <div class="left-col">
            <div class="card">
                <div class="mentor-msg" id="mentor-status">데이터베이스 연결 대기 중...</div>
                
                <h2>➕ 매수 내역 추가</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label style="font-size:0.7rem; font-weight:800;">매수가</label><input type="number" id="p-in" placeholder="0"></div>
                    <div><label style="font-size:0.7rem; font-weight:800;">수량</label><input type="number" id="s-in" placeholder="0"></div>
                </div>
                <button class="btn-add" onclick="addPosition()">데이터베이스에 저장 💾</button>

                <div id="pos-list" style="margin-top: 25px; max-height: 250px; overflow-y: auto;"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="card">
                <h2>📈 클라우드 분석 리포트</h2>
                <div class="stat-grid">
                    <div class="stat-box">평균단가<div id="res-avg" style="font-weight: 800; font-size: 1.3rem;">0원</div></div>
                    <div class="stat-box">총 보유량<div id="res-total" style="font-weight: 800; font-size: 1.3rem;">0주</div></div>
                </div>

                <label style="font-size:0.7rem; font-weight:800;">현재 주가 (실시간 손익 확인)</label>
                <input type="number" id="cur-p" oninput="updateAnalysis()" placeholder="현재 시장가 입력">

                <div class="profit-banner" id="profit-card">
                    <div id="res-profit" style="font-size: 2.2rem; font-weight: 900;">0원</div>
                    <div id="res-rate" style="font-weight: 800; font-size: 1.2rem;">0.00%</div>
                </div>

                <div style="height: 200px;"><canvas id="avgChart"></canvas></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🚨 민주야, 여기에 네 콘솔 설정값을 복사해 넣어라!
        const firebaseConfig = {
            apiKey: "AIzaSyALn9C2PHgMd95J41cNpceCojbp-c5Sfo0",
            authDomain: "jurinicalc.firebaseapp.com",
            projectId: "jurinicalc",
            storageBucket: "jurinicalc.appspot.com",
            messagingSenderId: "935820034253",
            appId: "1:935820034253:web:8ad46e0b4af866664aa984"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let positions = [];
        let currentUser = null;
        let chart = null;

        // 로그인/로그아웃 버튼 연결
        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // 🕵️ 유저 상태 감시 (심장부)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('btn-login').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').innerText = user.displayName + " 수료생";
                document.getElementById('mentor-status').innerText = "✅ 클라우드 데이터 동기화 완료. 안전하게 보호 중이다.";
                
                // Firestore에서 데이터 불러오기
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    positions = docSnap.data().saved_positions || [];
                    renderUI();
                }
            } else {
                currentUser = null;
                document.getElementById('btn-login').style.display = 'block';
                document.getElementById('user-info').style.display = 'none';
                document.getElementById('mentor-status').innerText = "⚠️ 로그인하지 않으면 데이터가 저장되지 않는다.";
                positions = [];
                renderUI();
            }
        });

        // 💾 데이터베이스 저장 함수
        async function syncToCloud() {
            if (currentUser) {
                await setDoc(doc(db, "users", currentUser.uid), { saved_positions: positions });
                console.log("Cloud Synced!");
            }
        }

        // 전역 함수 등록
        window.addPosition = () => {
            const p = parseFloat(document.getElementById('p-in').value);
            const s = parseFloat(document.getElementById('s-in').value);
            if (!p || !s) return alert("데이터를 정확히 입력해라!");

            positions.push({ price: p, shares: s, id: Date.now() });
            document.getElementById('p-in').value = '';
            document.getElementById('s-in').value = '';
            
            renderUI();
            syncToCloud();
        };

        window.deletePosition = (id) => {
            positions = positions.filter(item => item.id !== id);
            renderUI();
            syncToCloud();
        };

        function renderUI() {
            const list = document.getElementById('pos-list');
            list.innerHTML = positions.map(pos => `
                <div class="list-item">
                    <span><strong>${pos.price.toLocaleString()}원</strong> / ${pos.shares}주</span>
                    <button style="color:var(--danger); border:none; background:none; cursor:pointer; font-weight:800;" onclick="deletePosition(${pos.id})">삭제</button>
                </div>
            `).join('') || '<p style="text-align:center; color:var(--secondary);">기록이 없습니다.</p>';
            updateAnalysis();
        }

        window.updateAnalysis = () => {
            if (positions.length === 0) return;
            const totalS = positions.reduce((sum, p) => sum + p.shares, 0);
            const totalC = positions.reduce((sum, p) => sum + (p.price * p.shares), 0);
            const avgP = Math.round(totalC / totalS);
            const curP = parseFloat(document.getElementById('cur-p').value) || 0;

            document.getElementById('res-avg').innerText = avgP.toLocaleString() + "원";
            document.getElementById('res-total').innerText = totalS.toLocaleString() + "주";

            if (curP > 0) {
                const profit = (curP * totalS) - totalC;
                const rate = (profit / totalC) * 100;
                document.getElementById('res-profit').innerText = (profit >= 0 ? '+' : '') + profit.toLocaleString() + "원";
                document.getElementById('res-rate').innerText = (profit >= 0 ? '+' : '') + rate.toFixed(2) + "%";
                document.getElementById('profit-card').style.color = profit >= 0 ? 'var(--success)' : 'var(--danger)';
            }
            drawChart(avgP, curP);
        };

        function drawChart(avg, cur) {
            const ctx = document.getElementById('avgChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['내 평단', '현재가'],
                    datasets: [{ data: [avg, cur], backgroundColor: ['#FFD600', cur >= avg ? '#00D9A3' : '#FF6B6B'], borderRadius: 8 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false } } }
            });
        }

        window.toggleTheme = () => {
            const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
        };
    </script>
</body>
</html>
