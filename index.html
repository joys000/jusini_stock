<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주린이 계산기(베타) - 초보 투자자를 위한 무료 도구</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFD600;
            --primary-dark: #FFC400;
            --success: #00D9A3;
            --danger: #FF6B6B;
            --neutral: #2D3436;
            --neutral-light: #F8F9FA;
            --border-color: #E8E8E8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --bg-gradient-start: #FFF9E6;
            --bg-gradient-end: #FFFFFF;
            --card-bg: #FFFFFF;
        }
        
        body[data-theme="dark"] {
            --bg-gradient-start: #1A1A1A;
            --bg-gradient-end: #2D3436;
            --card-bg: #333333;
            --text-primary: #E8E8E8;
            --text-secondary: #B0B0B0;
            --border-color: #4A4A4A;
            --neutral-light: #2D3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        /* 🚨 수정된 미니멀 지수 바 (고정형, 박스 없음) */
        .index-ticker {
            padding: 15px 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
        }
        .ticker-wrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            animation: none !important; /* 움직임 완전 봉쇄 */
        }
        .index-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }
        .index-up { color: var(--success); }
        .index-down { color: var(--danger); }

        /* 공통 스타일 유지 */
        header { background: var(--card-bg); padding: 1.5rem 0; box-shadow: var(--shadow); }
        nav { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Fredoka', cursive; font-size: 2rem; text-decoration: none; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; }
        .theme-toggle { background: var(--neutral-light); border: 2px solid var(--border-color); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
        
        .hero { text-align: center; padding: 4rem 2rem; }
        .hero h1 { font-family: 'Fredoka', cursive; font-size: 3.5rem; margin-bottom: 1rem; }
        .highlight { color: var(--primary-dark); position: relative; }
        
        .stock-search-section { max-width: 900px; margin: 0 auto 4rem; padding: 0 2rem; }
        .search-container { background: var(--card-bg); padding: 3rem; border-radius: 24px; box-shadow: var(--shadow); }
        .search-box { position: relative; }
        #stock-search-input { width: 100%; padding: 1.25rem; border: 2px solid var(--border-color); border-radius: 16px; background: var(--neutral-light); color: var(--text-primary); font-size: 1.1rem; }
        
        .recent-searches { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .search-chip { background: var(--neutral-light); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; border: 1px solid var(--border-color); }
        
        .stock-info-card { background: var(--card-bg); border-radius: 20px; padding: 2rem; border: 2px solid var(--border-color); margin-top: 2rem; }
        .stock-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--border-color); padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .stock-price { font-size: 2.5rem; font-weight: 700; font-family: 'Fredoka', cursive; }
        .refresh-btn { background: var(--neutral-light); border: 1px solid var(--border-color); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .stock-details { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .detail-item { display: flex; justify-content: space-between; padding: 0.8rem; background: var(--neutral-light); border-radius: 12px; }
        
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto 6rem; padding: 0 2rem; }
        .tool-card { background: var(--card-bg); padding: 2.5rem; border-radius: 24px; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.3s; }
        .tool-card:hover { transform: translateY(-10px); }
        .tool-btn { width: 100%; padding: 1rem; background: var(--primary); border: none; border-radius: 50px; font-weight: 700; margin-top: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo"><div style="background:var(--primary); padding:5px; border-radius:10px;">📊</div> <span>주린이 계산기</span></a>
            <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">☀️</span></button>
        </nav>
    </header>

    <div class="index-ticker">
        <div id="ticker-content" class="ticker-wrapper">
            <span class="index-item">데이터 로딩 중... ⏳</span>
        </div>
    </div>

    <section class="hero">
        <h1>주식 투자, 이제 <span class="highlight">쉽게</span> 시작하세요</h1>
        <p>복잡한 계산은 맡기고, 투자에만 집중하세요. 100% 무료 도구</p>
    </section>

    <section class="stock-search-section">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="stock-search-input" placeholder="종목명 또는 티커 입력 (예: 삼성전자, AAPL)" autocomplete="off">
                <div id="recent-search-container" class="recent-searches"></div>
                <div id="stock-search-results" class="search-results" style="display:none; position:absolute; width:100%; background:var(--card-bg); z-index:10; border:1px solid var(--border-color); border-radius:12px; margin-top:5px; box-shadow:var(--shadow);"></div>
            </div>
            
            <div id="stock-info-card" class="stock-info-card" style="display: none;">
                <div class="stock-header">
                    <div><h3 id="stock-name">-</h3><p id="stock-symbol" style="color:var(--text-secondary);">-</p></div>
                    <div style="text-align:right;">
                        <div style="display:flex; align-items:center; gap:10px; justify-content:flex-end;">
                            <button id="refresh-price-btn" class="refresh-btn" onclick="refreshCurrentPrice()">🔄</button>
                            <div id="stock-price" class="stock-price">$0.00</div>
                        </div>
                        <div id="stock-change" style="font-weight:600;">-</div>
                    </div>
                </div>
                <div class="stock-details">
                    <div class="detail-item"><span>시가</span><span id="stock-open">-</span></div>
                    <div class="detail-item"><span>고가</span><span id="stock-high">-</span></div>
                    <div class="detail-item"><span>저가</span><span id="stock-low">-</span></div>
                    <div class="detail-item"><span>전일종가</span><span id="stock-prev-close">-</span></div>
                </div>
            </div>
        </div>
    </section>

    <div class="tools-grid">
        <div class="tool-card" onclick="location.href='dividend-calculator.html'">
            <h3>💰 배당금 계산기</h3>
            <p>미래의 배당 수익을 미리 시뮬레이션 하세요.</p>
            <button class="tool-btn">이동하기 →</button>
        </div>
        <div class="tool-card" onclick="location.href='average-calculator.html'">
            <h3>📊 평단가 계산기</h3>
            <p>물타기, 불타기 시 평단가를 계산합니다.</p>
            <button class="tool-btn">이동하기 →</button>
        </div>
    </div>

    <script>
        const RENDER_SERVER_URL = "https://dividend-server.onrender.com";
        const FINNHUB_API_KEY = 'd70u9vhr01ql6rg0mgr0d70u9vhr01ql6rg0mgrg';
        let currentSelectedSymbol = null;
        let isCurrentKR = false;

        // 1. 초기 가동 시스템
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadRecentSearches();
            fetchMarketIndices(); // 🚨 이놈이 범인이었을 걸세! 여기서 호출해야 하네.
            
            const searchInput = document.getElementById('stock-search-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => searchStocks(e.target.value.trim()));
            }
        });

        // 2. 시장 지수 로직 (고정형)
        async function fetchMarketIndices() {
            const container = document.getElementById('ticker-content');
            try {
                const res = await fetch(`${RENDER_SERVER_URL}/indices`);
                const result = await res.json();
                if (result.status === "success") {
                    container.innerHTML = result.data.map(idx => `
                        <span class="index-item">
                            ${idx.name} ${idx.price.toLocaleString()} 
                            <span class="${idx.change >= 0 ? 'index-up' : 'index-down'}">
                                ${idx.change >= 0 ? '▲' : '▼'} ${Math.abs(idx.pct)}%
                            </span>
                        </span>
                    `).join('');
                } else { container.innerHTML = "지수 데이터를 가져올 수 없습니다."; }
            } catch (e) { container.innerHTML = "서버 연결 중..."; }
        }

        // 3. 최근 검색 및 기타 기능
        function saveRecentSearch(symbol, name) {
            let searches = JSON.parse(localStorage.getItem('recentSearches') || '[]');
            searches = searches.filter(s => s.symbol !== symbol);
            searches.unshift({ symbol, name });
            if (searches.length > 5) searches.pop();
            localStorage.setItem('recentSearches', JSON.stringify(searches));
            renderRecentSearches();
        }

        function renderRecentSearches() {
            const container = document.getElementById('recent-search-container');
            const searches = JSON.parse(localStorage.getItem('recentSearches') || '[]');
            container.innerHTML = searches.map(s => `
                <div class="search-chip" onclick="selectStock('${s.symbol}', '${s.name}')">${s.name}</div>
            `).join('');
        }

        function loadRecentSearches() { renderRecentSearches(); }

        // 4. 주식 검색 엔진
        let searchTimer;
        async function searchStocks(query) {
            const resDiv = document.getElementById('stock-search-results');
            if (!query) { resDiv.style.display = 'none'; return; }
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                const [krRes, usRes] = await Promise.all([
                    fetch(`${RENDER_SERVER_URL}/search/kr?q=${encodeURIComponent(query)}`).catch(() => null),
                    fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(query)}&token=${FINNHUB_API_KEY}`).catch(() => null)
                ]);
                let combined = [];
                if (krRes?.ok) { const d = await krRes.json(); combined = [...combined, ...d.result]; }
                if (usRes?.ok) { const d = await usRes.json(); combined = [...combined, ...d.result.filter(i => !['BOND','FUTURE'].includes(i.type))]; }
                
                const unique = Array.from(new Map(combined.map(i => [i.symbol, i])).values());
                resDiv.innerHTML = unique.slice(0, 8).map(i => `
                    <div style="padding:10px; cursor:pointer; border-bottom:1px solid var(--border-color);" onclick="selectStock('${i.symbol}', '${i.description || i.displaySymbol}')">
                        <strong>${i.symbol}</strong> <small>${i.description || i.displaySymbol}</small>
                    </div>`).join('');
                resDiv.style.display = 'block';
            }, 300);
        }

        async function selectStock(symbol, name) {
            document.getElementById('stock-search-results').style.display = 'none';
            document.getElementById('stock-search-input').value = symbol;
            document.getElementById('stock-info-card').style.display = 'block';
            document.getElementById('stock-name').textContent = name;
            document.getElementById('stock-symbol').textContent = symbol;
            currentSelectedSymbol = symbol;
            isCurrentKR = symbol.endsWith('.KS') || symbol.endsWith('.KQ');
            saveRecentSearch(symbol, name);
            await fetchAndDisplayData();
        }

        async function fetchAndDisplayData() {
            const priceEl = document.getElementById('stock-price');
            priceEl.textContent = "Loading...";
            try {
                let url = isCurrentKR ? `${RENDER_SERVER_URL}/quote/kr/${currentSelectedSymbol}` : `https://finnhub.io/api/v1/quote?symbol=${currentSelectedSymbol}&token=${FINNHUB_API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                if (isCurrentKR && data.status === "success") {
                    priceEl.textContent = data.price + '원';
                    document.getElementById('stock-change').innerHTML = `${data.change} (${data.change_percent})`;
                    document.getElementById('stock-change').style.color = data.is_positive ? 'var(--success)' : 'var(--danger)';
                    document.getElementById('stock-open').textContent = data.open + '원';
                    document.getElementById('stock-high').textContent = data.high + '원';
                    document.getElementById('stock-low').textContent = data.low + '원';
                    document.getElementById('stock-prev-close').textContent = data.prev_close + '원';
                } else if (!isCurrentKR && data.c) {
                    priceEl.textContent = '$' + data.c.toFixed(2);
                    document.getElementById('stock-change').innerHTML = `${data.d >= 0 ? '+' : ''}${data.d.toFixed(2)} (${data.dp.toFixed(2)}%)`;
                    document.getElementById('stock-change').style.color = data.d >= 0 ? 'var(--success)' : 'var(--danger)';
                    document.getElementById('stock-open').textContent = '$' + data.o.toFixed(2);
                    document.getElementById('stock-high').textContent = '$' + data.h.toFixed(2);
                    document.getElementById('stock-low').textContent = '$' + data.l.toFixed(2);
                    document.getElementById('stock-prev-close').textContent = '$' + data.pc.toFixed(2);
                }
            } catch (e) { priceEl.textContent = "에러 발생"; }
        }

        async function refreshCurrentPrice() {
            const btn = document.getElementById('refresh-price-btn');
            btn.classList.add('spinning');
            await fetchAndDisplayData();
            setTimeout(() => btn.classList.remove('spinning'), 1000);
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') document.body.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-icon').textContent = saved === 'dark' ? '🌙' : '☀️';
        }

        function toggleTheme() {
            const isDark = document.body.hasAttribute('data-theme');
            document.body.toggleAttribute('data-theme');
            const nowDark = document.body.hasAttribute('data-theme');
            localStorage.setItem('theme', nowDark ? 'dark' : 'light');
            document.querySelector('.theme-icon').textContent = nowDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
